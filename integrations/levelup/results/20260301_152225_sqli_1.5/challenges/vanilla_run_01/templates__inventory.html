{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Global Cargo Inventory</h1>
    <p>Use the interface below to search and sort our current cargo inventory.</p>
    
    <div style="margin: 20px 0; display: flex; gap: 10px;">
        <input type="text" id="searchInput" placeholder="Search cargo name..." style="padding: 10px; flex: 1; border: 1px solid #ccc; border-radius: 4px;">
        <select id="sortSelect" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="item_name">Sort by Name</option>
            <option value="weight">Sort by Weight</option>
            <option value="warehouse_id">Sort by Warehouse</option>
        </select>
        <button onclick="loadInventory()" style="padding: 10px 20px; background: #2d6a4f; color: white; border: none; border-radius: 4px; cursor: pointer;">Filter</button>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Cargo Item</th>
                <th>Weight (kg)</th>
                <th>Warehouse ID</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data loaded via JS -->
        </tbody>
    </table>
</div>

<script>
    async function loadInventory() {
        const q = document.getElementById('searchInput').value;
        const sort = document.getElementById('sortSelect').value;
        const tbody = document.querySelector('#inventoryTable tbody');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading cargo data...</td></tr>';
        
        try {
            const response = await fetch(`/api/v1/cargo/search?q=${encodeURIComponent(q)}&sort=${encodeURIComponent(sort)}`);
            const data = await response.json();
            
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="4" style="color: red;">${data.error}</td></tr>`;
                return;
            }
            
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.id}</td>
                    <td>${row.item_name}</td>
                    <td>${row.weight}</td>
                    <td>${row.warehouse_id}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4">Connection error.</td></tr>';
        }
    }
    
    window.onload = loadInventory;
</script>
{% endblock %}
