{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Custom Manifest Reporting</h2>
    <p>Generate optimized sorting reports for logistics audit.</p>
    <div style="margin: 1rem 0;">
        <label>Sort By:</label>
        <select id="sortBy">
            <option value="origin">Origin City</option>
            <option value="destination">Destination City</option>
            <option value="tracking_number">Tracking Number</option>
            <option value="status">Status</option>
        </select>
        <button onclick="generateReport()" class="btn">Generate View</button>
    </div>
    <div id="reportContent">
        <p style="color: #666;">Select sorting criteria and click generate.</p>
    </div>
</div>
<script>
async function generateReport() {
    const sortBy = document.getElementById('sortBy').value;
    const response = await fetch('/api/v1/reports/custom', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sort_by: sortBy, direction: 'ASC' })
    });
    const data = await response.json();
    if (data.error) {
        document.getElementById('reportContent').innerHTML = `<div class="alert">${data.error}</div>`;
    } else {
        let html = '<table><tr><th>Origin</th><th>Destination</th><th>Tracking</th></tr>';
        data.forEach(row => {
            html += `<tr><td>${row.origin}</td><td>${row.destination}</td><td>${row.tracking_number}</td></tr>`;
        });
        html += '</table>';
        document.getElementById('reportContent').innerHTML = html;
    }
}
</script>
{% endblock %}
