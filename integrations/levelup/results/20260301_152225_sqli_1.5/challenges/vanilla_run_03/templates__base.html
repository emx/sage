<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AetherLogistics Global</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        nav { background: #1a2a3a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #8eb9ff; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .btn { background: #0056b3; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #004494; }
        .alert { padding: 1rem; background: #ffe3e3; border: 1px solid #ffbaba; color: #d8000c; margin-bottom: 1rem; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <span style="font-size: 1.5rem; letter-spacing: 1px;">AETHER<b>LOGISTICS</b></span>
        <div>
            <a href="/">Home</a>
            {% if session.user_id %}
                <a href="/dashboard">Dashboard</a>
                <a href="/shipments">Shipments</a>
                <a href="/reports">Reporting</a>
                <a href="/logout">Logout ({{ session.username }})</a>
            {% else %}
                <a href="/login">Client Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
