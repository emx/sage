{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Internal Audit Logs</h2>
    <p>Sorting by: <strong>{{ current_sort }}</strong></p>
    <div style="margin-bottom: 15px;">
        Sort by: 
        <a href="/audit?sort=timestamp">Timestamp</a> | 
        <a href="/audit?sort=action">Action</a> | 
        <a href="/audit?sort=id">Entry ID</a>
    </div>
    <table>
        <thead>
            <tr><th>Entry ID</th><th>Timestamp</th><th>Action</th><th>Details</th></tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.id }}</td>
                <td>{{ log.timestamp }}</td>
                <td><code>{{ log.action }}</code></td>
                <td>{{ log.details }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
