<!DOCTYPE html>
<html>
<head>
    <title>Vanguard Orbital Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #30363d; display: flex; justify-content: space-between; }
        nav a { color: #58a6ff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 40px; max-width: 1000px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { color: #8b949e; }
        .btn { background: #238636; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: #2ea043; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">VANGUARD ORBITAL</a>
            <a href="/inventory">Inventory</a>
            <a href="/shipments">Shipments</a>
            <a href="/audit">Audit Logs</a>
        </div>
        <div>
            {% if session.user %}
                <span>Welcome, {{ session.user }}</span> | <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
