{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Global Inventory Manifest</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>Component</th><th>Serial No.</th><th>Location</th></tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.item_name }}</td>
                <td><code>{{ item.serial_no }}</code></td>
                <td>{{ item.location }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
