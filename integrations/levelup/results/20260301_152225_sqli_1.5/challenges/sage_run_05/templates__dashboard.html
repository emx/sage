{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Officer Dashboard</h2>
    <p>Status: <span style="color: #3fb950;">System Operational</span></p>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="card" style="border-color: #58a6ff;">
            <h3>Inventory View</h3>
            <p>Check status of satellite components.</p>
            <a href="/inventory">Go to Inventory &rarr;</a>
        </div>
        <div class="card" style="border-color: #58a6ff;">
            <h3>Logistics Audit</h3>
            <p>Review system logs and user actions.</p>
            <a href="/audit">Go to Audit &rarr;</a>
        </div>
    </div>
</div>
{% endblock %}
