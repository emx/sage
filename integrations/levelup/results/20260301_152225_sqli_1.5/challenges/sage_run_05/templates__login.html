{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Personnel Authentication</h2>
    {% if error %}<p style="color: #f85149;">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px; margin-top: 5px; background: #0d1117; color: white; border: 1px solid #30363d;">
        </div>
        <div style="margin-bottom: 20px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px; margin-top: 5px; background: #0d1117; color: white; border: 1px solid #30363d;">
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    <p style="font-size: 0.8rem; color: #8b949e; margin-top: 15px;">Guest access: guest / guest123</p>
</div>
{% endblock %}
