{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Manifest Search</h2>
    <form method="GET">
        <input type="text" name="q" placeholder="Search by vessel or ID..." style="padding:10px; width:300px;">
        <button type="submit" class="btn">Search</button>
    </form>
    {% if results %}
    <table>
        <thead>
            <tr>
                <th>Container ID</th>
                <th>Vessel</th>
                <th>Port of Origin</th>
            </tr>
        </thead>
        <tbody>
            {% for r in results %}
            <tr>
                <td>{{ r.container_id }}</td>
                <td>{{ r.vessel_name }}</td>
                <td>{{ r.origin_port }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p style="margin-top:20px;">No manifests found.</p>
    {% endif %}
</div>
{% endblock %}
