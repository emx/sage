{% extends "base.html" %}
{% block content %}
<h1>Component Inventory</h1>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Part Number</th>
            <th>Quantity</th>
            <th>Facility</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.part_number }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.facility_name }}</td>
            <td>
                <a href="/inventory/{{ item.id }}" class="btn">Details</a>
                <!-- <a href="/api/v1/telemetry?node_id={{ item.id }}" style="display:none">Internal Telemetry</a> -->
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
