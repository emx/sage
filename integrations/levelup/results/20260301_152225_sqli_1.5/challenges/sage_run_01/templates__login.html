{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>System Authentication</h2>
    <form>
        <div style="margin-bottom: 1rem;">
            <label>Employee ID</label><br>
            <input type="text" style="width: 100%; padding: 8px;" disabled value="VERIDIANT-GUEST">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Access Key</label><br>
            <input type="password" style="width: 100%; padding: 8px;" placeholder="Required for higher privileges">
        </div>
        <button type="button" class="btn" onclick="alert('Guest mode active. No key required.')">Enter Portal</button>
    </form>
</div>
{% endblock %}
