<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veridiant BioLogistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        nav { background-color: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .btn { background-color: #27ae60; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <span><strong>Veridiant BioLogistics</strong> | Coordinator Portal</span>
        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/shipments">Shipments</a>
            <a href="/settings">Settings</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
