{% extends "base.html" %}
{% block content %}
<h1>Operations Dashboard</h1>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h3>Active Shipments</h3>
        <p>Current: 128 High-Priority</p>
        <a href="/shipments">View All Shipments</a>
    </div>
    <div class="card">
        <h3>Environmental Telemetry</h3>
        <p id="loading-msg">Loading latest readings...</p>
        <table id="telemetry-table" style="display:none;">
            <thead>
                <tr><th>ID</th><th>Sensor</th><th>Reading</th><th>Time</th></tr>
            </thead>
            <tbody id="telemetry-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Log-fetching logic for the dashboard
    fetch('/api/v1/telemetry?sort=timestamp DESC')
        .then(response => response.json())
        .then(data => {
            const body = document.getElementById('telemetry-body');
            data.slice(0, 5).forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.id}</td><td>${row.sensor_id}</td><td>${row.reading}</td><td>${row.timestamp}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('telemetry-table').style.display = 'table';
        });
</script>
{% endblock %}
