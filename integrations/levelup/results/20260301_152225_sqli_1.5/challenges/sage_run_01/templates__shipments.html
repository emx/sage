{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Recent Shipments</h2>
    <table>
        <tr>
            <th>Tracking #</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Status</th>
        </tr>
        {% for shipment in shipments %}
        <tr>
            <td>{{ shipment.tracking_number }}</td>
            <td>{{ shipment.origin }}</td>
            <td>{{ shipment.destination }}</td>
            <td>{{ shipment.status }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
