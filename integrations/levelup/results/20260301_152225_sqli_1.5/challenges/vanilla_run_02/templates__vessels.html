{% extends 'base.html' %}
{% block content %}
<h1>Vessel Telemetry</h1>
<div class="card">
    <table>
        <thead><tr><th>ID</th><th>Vessel Name</th><th>Type</th><th>Region</th></tr></thead>
        <tbody>
            {% for v in vessels %}
            <tr><td>{{ v['id'] }}</td><td>{{ v['vessel_name'] }}</td><td>{{ v['vessel_type'] }}</td><td>{{ v['region'] }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
