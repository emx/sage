{% extends 'base.html' %}
{% block content %}
<h1>Historical Harvest Records</h1>
<div class="card">
    <p>Data retrieved via telemetry API v1. Sorted by most recent by default.</p>
    <table id="harvestTable">
        <thead>
            <tr>
                <th onclick="loadData('vessel_name')" style="cursor:pointer">Vessel &#8597;</th>
                <th onclick="loadData('kelp_type')" style="cursor:pointer">Species &#8597;</th>
                <th onclick="loadData('nutrient_salinity')" style="cursor:pointer">Salinity (PSU) &#8597;</th>
                <th onclick="loadData('harvest_date')" style="cursor:pointer">Date &#8597;</th>
            </tr>
        </thead>
        <tbody id="harvestBody">
        </tbody>
    </table>
</div>
<script>
function loadData(sort = 'harvest_date') {
    fetch('/api/v1/harvest/history?sort=' + sort)
    .then(r => r.json())
    .then(data => {
        const body = document.getElementById('harvestBody');
        body.innerHTML = '';
        if (data.error) {
            body.innerHTML = '<tr><td colspan="4" style="color:red">' + data.error + '</td></tr>';
            return;
        }
        data.forEach(row => {
            body.innerHTML += `<tr>
                <td>${row.vessel_name}</td>
                <td>${row.kelp_type}</td>
                <td>${row.nutrient_salinity}</td>
                <td>${row.harvest_date}</td>
            </tr>`;
        });
    });
}
loadData();
</script>
{% endblock %}
