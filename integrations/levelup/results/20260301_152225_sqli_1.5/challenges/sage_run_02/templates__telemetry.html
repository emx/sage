{% extends "base.html" %}
{% block content %}
<h2>Live Telemetry Feed</h2>
<div class="card">
    <p>Payload: <strong>Aether-7 Global Comm</strong></p>
    <div id="telemetry-table-container">
        <table id="telemetry-table">
            <thead>
                <tr><th>ID</th><th>Sensor</th><th>Value</th><th>Timestamp</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script>
    async function loadTelemetry() {
        const response = await fetch('/api/v1/telemetry/data?sat_id=1&sort=timestamp');
        const data = await response.json();
        const tbody = document.querySelector('#telemetry-table tbody');
        tbody.innerHTML = '';
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.id}</td><td>${row.sensor}</td><td>${row.value}</td><td>${row.timestamp}</td>`;
            tbody.appendChild(tr);
        });
    }
    loadTelemetry();
</script>
{% endblock %}
