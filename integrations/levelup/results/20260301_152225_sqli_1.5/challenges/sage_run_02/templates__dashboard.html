{% extends "base.html" %}
{% block content %}
<h2>Active Satellite Fleet</h2>
<div class="card">
    <table>
        <tr><th>Name</th><th>Serial</th><th>Orbit</th><th>Status</th></tr>
        {% for sat in satellites %}
        <tr>
            <td>{{ sat.name }}</td>
            <td>{{ sat.serial_number }}</td>
            <td>{{ sat.orbit }}</td>
            <td><span style="color:green">● Online</span></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
