{% extends "base.html" %}
{% block content %}
<h2>Historical Shipping Manifests</h2>
<div class="card">
    <form action="/manifests" method="GET">
        <input type="text" name="q" placeholder="Search cargo items...">
        <button type="submit" class="btn">Search</button>
    </form>
    <br>
    <table>
        <tr><th>Item Name</th><th>Weight (kg)</th><th>Destination</th></tr>
        {% for item in items %}
        <tr>
            <td>{{ item.item_name }}</td>
            <td>{{ item.weight }}</td>
            <td>{{ item.destination }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
