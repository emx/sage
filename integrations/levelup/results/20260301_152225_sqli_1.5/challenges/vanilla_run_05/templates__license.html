{% extends "base.html" %}
{% block title %}License Request{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>License Application</h2>
    {% if success %}
    <div style="background: #d4edda; color: #155724; padding: 1rem; border-radius: 4px;">
        Your request has been submitted. A media librarian will contact you within 24 hours.
    </div>
    {% else %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Full Name</label><br>
            <input type="text" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Production Company</label><br>
            <input type="text" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Usage Type</label><br>
            <select style="width: 100%; padding: 8px; margin-top: 5px;">
                <option>Documentary (Educational)</option>
                <option>Commercial Production</option>
                <option>Digital/Web Only</option>
                <option>Personal Research</option>
            </select>
        </div>
        <button type="submit" class="btn">Submit Request</button>
    </form>
    {% endif %}
</div>
{% endblock %}
