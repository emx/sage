{% extends 'base.html' %}
{% block content %}
<h2>User Profile</h2>
<div class="card p-4 mt-4">
    <div class="row">
        <div class="col-md-2">
            <img src="https://ui-avatars.com/api/?name={{ session.username }}&size=128" class="img-fluid rounded-circle">
        </div>
        <div class="col-md-10">
            <h3>{{ session.username }}</h3>
            <p><strong>Role:</strong> {{ session.role }}</p>
            <p><strong>Department:</strong> Logistics Management</p>
            <p><strong>Access Level:</strong> Restricted (Coordinator)</p>
        </div>
    </div>
</div>
{% endblock %}
