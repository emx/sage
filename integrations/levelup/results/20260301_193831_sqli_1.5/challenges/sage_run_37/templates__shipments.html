{% extends 'base.html' %}
{% block content %}
<h1>Active Shipments</h1>
<div class='card'>
    <table id='shipmentTable'>
        <thead>
            <tr>
                <th onclick="loadShipments('id')">ID</th>
                <th onclick="loadShipments('tracking_no')">Tracking #</th>
                <th onclick="loadShipments('origin')">Origin</th>
                <th onclick="loadShipments('destination')">Destination</th>
                <th onclick="loadShipments('status')">Status</th>
            </tr>
        </thead>
        <tbody id='tableBody'></tbody>
    </table>
</div>
<script>
function loadShipments(sort) {
    fetch('/api/v1/shipments/query?sort=' + sort)
        .then(res => res.json())
        .then(data => {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            data.forEach(row => {
                body.innerHTML += `<tr><td>${row.id}</td><td>${row.tracking_no}</td><td>${row.origin}</td><td>${row.destination}</td><td>${row.status}</td></tr>`;
            });
        });
}
loadShipments('id');
</script>
{% endblock %}
