<!DOCTYPE html>
<html>
<head>
    <title>AetherFlow Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; cursor: pointer; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div><strong>AetherFlow Logistics</strong></div>
        <div>
            <a href='/'>Home</a>
            <a href='/dashboard'>Dashboard</a>
            <a href='/shipments'>Shipments</a>
            <a href='/inventory'>Inventory</a>
            <a href='/about'>About</a>
        </div>
    </nav>
    <div class='container'>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
