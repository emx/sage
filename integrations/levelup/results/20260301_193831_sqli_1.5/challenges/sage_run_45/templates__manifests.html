{% extends "base.html" %}
{% block content %}
<div class="vanguard-header">
    <h2>Active Shipping Manifests</h2>
</div>
<table class="table table-hover bg-white rounded">
    <thead class="table-dark">
        <tr>
            <th>Tracking #</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Cargo Type</th>
            <th>Priority</th>
        </tr>
    </thead>
    <tbody>
        {% for m in manifests %}
        <tr>
            <td>{{ m.tracking_number }}</td>
            <td>{{ m.origin }}</td>
            <td>{{ m.destination }}</td>
            <td>{{ m.cargo_type }}</td>
            <td>{{ m.priority }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
