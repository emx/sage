{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Batch Compliance Verification</h2>
    <p>Enter a Batch ID to verify its compliance status across our logistics network.</p>
    <input type="text" id="batch_id" placeholder="B-XXXX">
    <button onclick="verify()" class="btn">Verify Batch</button>
    <div id="result" style="margin-top: 20px;"></div>
</div>

<script>
function verify() {
    const bid = document.getElementById('batch_id').value;
    const resDiv = document.getElementById('result');
    resDiv.innerHTML = "Checking...";
    
    fetch(`/api/v1/compliance/verify?batch_id=${encodeURIComponent(bid)}`)
    .then(r => r.json())
    .then(data => {
        if(data.status === 'compliant') {
            resDiv.innerHTML = `<p style="color: green;"><strong>VERIFIED:</strong> Batch ${bid} is compliant. Inspector: ${data.inspector}</p>`;
        } else if(data.status === 'error') {
            resDiv.innerHTML = `<p style="color: red;"><strong>ERROR:</strong> ${data.message}</p>`;
        } else {
            resDiv.innerHTML = `<p style="color: orange;"><strong>NOT FOUND:</strong> Batch ID does not exist in our active records.</p>`;
        }
    })
    .catch(e => {
        resDiv.innerHTML = "<p style='color: red;'>System error.</p>";
    });
}
</script>
{% endblock %}
