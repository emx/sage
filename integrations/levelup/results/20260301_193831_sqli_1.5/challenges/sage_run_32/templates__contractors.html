{% extends 'base.html' %}
{% block content %}
<h1>Authorized Personnel</h1>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Clearance</th>
                <th>Specialization</th>
            </tr>
        </thead>
        <tbody>
            {% for c in contractors %}
            <tr>
                <td>{{ c.name }}</td>
                <td>Level {{ c.clearance_level }}</td>
                <td>{{ c.specialization }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
