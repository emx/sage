{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: auto;">
    <div class="card">
        <h2>Authentication Required</h2>
        {% if error %}<p class="alert">{{ error }}</p>{% endif %}
        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <label>Username</label><br>
                <input type="text" name="username" style="width: 100%;" required>
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Password</label><br>
                <input type="password" name="password" style="width: 100%;" required>
            </div>
            <button type="submit" class="btn">Enter Terminal</button>
        </form>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 1rem;">Note: External contractors use guest:guest123</p>
    </div>
</div>
{% endblock %}
