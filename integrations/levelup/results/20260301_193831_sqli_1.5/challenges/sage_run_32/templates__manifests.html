{% extends 'base.html' %}
{% block content %}
<h1>Upcoming Orbital Manifests</h1>
<div class="card">
    <p>Search and sort the upcoming launch manifest schedule.</p>
    <table id="manifestTable">
        <thead>
            <tr>
                <th onclick="loadManifests('cargo_id')">Cargo ID</th>
                <th onclick="loadManifests('weight')">Weight (kg)</th>
                <th onclick="loadManifests('destination')">Destination</th>
                <th onclick="loadManifests('status')">Status</th>
            </tr>
        </thead>
        <tbody id="manifestBody"></tbody>
    </table>
</div>

<script>
async function loadManifests(sortCol = 'cargo_id') {
    const response = await fetch(`/api/v1/manifests?sort=${sortCol}&order=asc`);
    const data = await response.json();
    const tbody = document.getElementById('manifestBody');
    tbody.innerHTML = '';
    data.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.cargo_id}</td><td>${row.weight}</td><td>${row.destination}</td><td>${row.status}</td>`;
        tbody.appendChild(tr);
    });
}
loadManifests();
</script>
{% endblock %}
