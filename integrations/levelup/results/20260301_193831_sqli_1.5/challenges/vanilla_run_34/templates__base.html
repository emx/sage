<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VeloNexus | FMS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f9; color: #333; }
        nav { background: #1a2a6c; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 1.5rem; font-weight: 500; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a2a6c; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; cursor: pointer; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; background: #e2e8f0; }
        .footer { text-align: center; padding: 2rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: bold;">VELONEXUS LOGISTICS</div>
        <div>
            <a href="/">Home</a>
            <a href="/shipments">Shipments</a>
            <a href="/tracking">Tracking</a>
            <a href="/login">Staff Portal</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">&copy; 2024 VeloNexus Global Logistics Solutions. All Rights Reserved.</div>
</body>
</html>
