{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h1>Staff Login</h1>
    {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    <form>
        <label>Username</label><br>
        <input type="text" style="width: 100%; padding: 8px; margin-bottom: 1rem;" disabled><br>
        <label>Password</label><br>
        <input type="password" style="width: 100%; padding: 8px; margin-bottom: 1rem;" disabled><br>
        <button type="button" style="width: 100%; padding: 10px; background: #ccc; border: none;" disabled>Login</button>
    </form>
</div>
{% endblock %}
