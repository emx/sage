<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vexillum Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; background: white; min-height: 80vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .footer { text-align: center; padding: 1rem; font-size: 0.8rem; color: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #34495e; color: white; }
        .alert { padding: 15px; background-color: #d4edda; color: #155724; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>Vexillum Logistics</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/manifests">Manifests</a>
            <a href="/fleet">Fleet</a>
            <a href="/portal/login">Partner Portal</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        &copy; 2024 Vexillum Logistics & Freight | System Status: Optimal | Node: Registry-V2
    </div>
</body>
</html>
