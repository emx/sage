{% extends 'base.html' %}
{% block content %}
<h1>Fleet Operations</h1>
<p>Current active vessels in the Vexillum fleet.</p>
<table>
    <tr><th>Vessel Name</th><th>Last Reported Position</th></tr>
    {% for v in vessels %}
    <tr><td>{{ v.name }}</td><td>{{ v.coords }}</td></tr>
    {% endfor %}
</table>
<p style="font-size: 0.7rem; color: #ccc; margin-top: 50px;">Debug Hint: app_registry connectivity confirmed.</p>
{% endblock %}
