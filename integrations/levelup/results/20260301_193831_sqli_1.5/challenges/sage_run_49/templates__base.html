<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VerdantLogix Intelligence</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #ecf0f1; }
        .status-ok { color: green; font-weight: bold; }
        .status-warn { color: orange; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VerdantLogix</strong> Intelligence Portal</div>
        <div>
            {% if session.username %}
                <a href="/dashboard">Dashboard</a>
                <a href="/manifests">Manifests</a>
                <a href="/telemetry">Telemetry</a>
                <a href="/logout">Logout ({{ session.username }})</a>
            {% else %}
                <a href="/">Home</a>
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
