<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloceFreight | Global Logistics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a2a6c; }
        .navbar-brand, .nav-link { color: white !important; }
        .hero-section { background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d); color: white; padding: 60px 0; }
        .footer { background-color: #222; color: #888; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">VeloceFreight Global</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    {% if session.user %}
                        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/fleet">Fleet</a></li>
                        <li class="nav-item"><a class="nav-link" href="/logout">Logout ({{ session.user }})</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="/login">Dispatcher Login</a></li>
                    {% endif %}
                    <li class="nav-item"><a class="nav-link" href="/support">Support</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2024 VeloceFreight Global Logistics. Port Authority Certified.</p>
        </div>
    </footer>
</body>
</html>
