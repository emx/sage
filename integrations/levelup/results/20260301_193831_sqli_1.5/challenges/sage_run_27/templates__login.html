{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Portal Login</h2>
    {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px;" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    <p style="font-size: 0.8rem; color: #666; margin-top: 1rem;">Note: Use guest credentials for manifest audit.</p>
</div>
{% endblock %}
