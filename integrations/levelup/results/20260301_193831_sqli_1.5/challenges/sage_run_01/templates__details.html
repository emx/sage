{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>{{ item.name }}</h2>
    <hr>
    <p><strong>Origin:</strong> {{ item.origin }}</p>
    <p><strong>Description:</strong> {{ item.description }}</p>
    <p><strong>Storage Requirements:</strong> {{ item.storage_reqs }}</p>
    <p><strong>Security Level:</strong> {{ item.security_level }}</p>
    <a href="/inventory" class="btn">Back to Inventory</a>
</div>
{% endblock %}
