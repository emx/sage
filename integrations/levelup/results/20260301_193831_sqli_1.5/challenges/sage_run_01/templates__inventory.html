{% extends "base.html" %}
{% block content %}
<h2>Global High-Value Inventory</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Artifact Name</th>
            <th>Origin</th>
            <th>Security Class</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.origin }}</td>
            <td>{{ item.security_level }}</td>
            <td><a href="/inventory/view/{{ item.id }}" class="btn">View Details</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
