<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veridian Gilt Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; color: #333; margin: 0; }
        nav { background: #1a1a2e; color: #fff; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #e94560; text-decoration: none; margin: 0 10px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn { background: #e94560; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .alert { color: #721c24; background-color: #f8d7da; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav>
        <div>Veridian Gilt Logistics Portal</div>
        <div>
            <a href="/">Home</a>
            <a href="/inventory">Inventory</a>
            <a href="/status">Facility Status</a>
            <a href="/login">Login</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
