{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Real-time Container Tracking</h2>
    <p>Enter your container ID to see current transit status.</p>
    <input type="text" placeholder="OSL-XXXX-XXXX" style="padding: 10px; width: 300px;">
    <button class="btn">Locate</button>
    {% if container_id %}
    <div style="margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1rem;">
        <h3>Result for: {{ container_id }}</h3>
        <p>Status: <strong>In Transit</strong></p>
        <p>Last Seen: Singapore Port Terminal (Gate 4)</p>
    </div>
    {% endif %}
</div>
{% endblock %}
