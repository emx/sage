{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Active Shipping Manifests</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Container ID</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        {% for m in manifests %}
        <tr>
            <td>{{ m.id }}</td>
            <td>{{ m.container_id }}</td>
            <td>{{ m.origin }}</td>
            <td>{{ m.destination }}</td>
            <td>{{ m.status }}</td>
            <td><a href="/manifest/{{ m.id }}">View Details</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
