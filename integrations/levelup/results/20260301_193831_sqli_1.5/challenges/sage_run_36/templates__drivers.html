{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Driver Directory</h2>
    <table>
        <tr>
            <th>Badge ID</th>
            <th>Full Name</th>
            <th>Status</th>
            <th>Clearance</th>
        </tr>
        {% for driver in drivers %}
        <tr>
            <td>{{ driver.badge_id }}</td>
            <td>{{ driver.name }}</td>
            <td>Active</td>
            <td>{{ driver.clearance_level }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
