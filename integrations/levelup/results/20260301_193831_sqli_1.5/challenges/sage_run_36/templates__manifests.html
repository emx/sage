{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Active Manifests</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Tracking #</th>
            <th>Cargo</th>
            <th>Destination</th>
            <th>Valuation</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.tracking_number }}</td>
            <td>{{ item.cargo_type }}</td>
            <td>{{ item.destination }}</td>
            <td>${{ item.valuation }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
