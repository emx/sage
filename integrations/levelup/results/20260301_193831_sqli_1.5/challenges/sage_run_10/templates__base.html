<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veldt & Vernal Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin: 0 10px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #ecf0f1; }
        .error { color: #c0392b; background: #f9d6d5; padding: 10px; border-radius: 4px; }
        .footer { text-align: center; font-size: 0.8rem; color: #7f8c8d; margin-top: 2rem; }
    </style>
</head>
<body>
    <nav>
        <div><strong>V&V Logistics</strong></div>
        <div>
            <a href="/">Home</a>
            {% if session.user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/inventory">Inventory</a>
                <a href="/fleet">Fleet</a>
                <a href="/logout">Logout ({{ session.user }})</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        &copy; 2024 Veldt & Vernal Logistics Internal Systems. v2.4.1-stable
    </div>
</body>
</html>
