{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Warehouse Inventory</h2>
    <table>
        <thead>
            <tr>
                <th>SKU</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Location</th>
                <th>Temp (C)</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.sku }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.location }}</td>
                <td>{{ item.temp }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
