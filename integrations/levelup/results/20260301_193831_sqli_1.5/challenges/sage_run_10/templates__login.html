{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px; box-sizing: border-box;">
        </div>
        <button type="submit" style="background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Sign In</button>
    </form>
</div>
{% endblock %}
