{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Portal Access</h3>
                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Personnel Username</label>
                        <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Security Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Authenticate</button>
                </form>
                <div class="mt-3 text-center text-secondary">
                    <small>Default Access: guest / guest1234</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
