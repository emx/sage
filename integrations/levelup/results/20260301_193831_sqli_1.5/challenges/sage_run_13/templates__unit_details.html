{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header bg-dark">Unit Diagnostics: {{ unit.serial_no }}</div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <p><strong>Model:</strong> {{ unit.model }}</p>
                <p><strong>Status:</strong> {{ unit.status }}</p>
                <p><strong>Facility ID:</strong> {{ unit.facility_id }}</p>
            </div>
            <div class="col-md-6">
                <p><strong>Last Maintenance:</strong> 2024-03-12</p>
                <p><strong>Propulsion Efficiency:</strong> 98.4%</p>
            </div>
        </div>
    </div>
</div>
<div class="mt-3">
    <a href="/units" class="btn btn-secondary">Back to List</a>
</div>
{% endblock %}
