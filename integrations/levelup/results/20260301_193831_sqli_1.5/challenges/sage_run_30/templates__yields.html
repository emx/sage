{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Regional Crop Yields</h2>
    <p>Current harvest weights by region.</p>
    <table>
        <tr>
            <th>Region ID</th>
            <th>Crop Type</th>
            <th>Yield Weight (Tons)</th>
        </tr>
        {% for crop in crops %}
        <tr>
            <td>{{ crop.region }}</td>
            <td>{{ crop.crop_type }}</td>
            <td>{{ crop.yield_weight }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
