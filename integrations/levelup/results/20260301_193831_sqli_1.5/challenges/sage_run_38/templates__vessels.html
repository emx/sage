{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Active Fleet Inventory</h2>
    <p>Select a vessel to view detailed manifest telemetry and customs status.</p>
    <div class="row">
        {% for vessel in vessels %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ vessel.name }}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">Flag: {{ vessel.flag_state }}</h6>
                    <p class="card-text">Type: {{ vessel.vessel_type }}</p>
                    <a href="/vessel/{{ vessel.id }}" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
