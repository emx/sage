{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h3 class="text-center mb-4">Customs Agent Login</h3>
            <form>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Agent ID">
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Password">
                </div>
                <button type="button" class="btn btn-dark w-100" onclick="alert('Unauthorized Access Attempt Logged')">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
