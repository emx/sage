{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div id="vessel-content">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading vessel data...</span>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const vesselId = "{{ vessel_id }}";
        fetch(`/api/v1/vessel/details?id=${vesselId}`)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('vessel-content');
                if (data.error) {
                    container.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                } else {
                    container.innerHTML = `
                        <nav aria-label="breadcrumb">
                          <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/vessels">Fleet</a></li>
                            <li class="breadcrumb-item active">${data.name}</li>
                          </ol>
                        </nav>
                        <div class="jumbotron bg-light p-5 rounded">
                            <h1 class="display-4">${data.name}</h1>
                            <p class="lead">System ID: ${data.id} | Registry: ${data.flag_state}</p>
                            <hr class="my-4">
                            <p><strong>Vessel Class:</strong> ${data.vessel_type}</p>
                            <p><strong>Current Status:</strong> <span class="badge bg-success">${data.status}</span></p>
                            <p>All manifest data for this vessel is currently synchronized with Central Command.</p>
                        </div>
                    `;
                }
            });
    });
</script>
{% endblock %}
