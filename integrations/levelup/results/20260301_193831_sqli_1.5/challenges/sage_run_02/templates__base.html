<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VeloSync Logistics - Internal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sidebar { background: #34495e; min-height: 100vh; color: white; padding: 20px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 10px 0; }
        .sidebar a:hover { color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">VELOSYNC LOGISTICS</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    {% if session.user %}
                    <li class="nav-item"><a class="nav-link" href="#">User: {{ session.user }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="/">Logout</a></li>
                    {% else %}
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <h5>Operations</h5>
                <a href="/dashboard">Dashboard</a>
                <a href="/fleet">Fleet Tracking</a>
                <a href="/reports">Telemetry Reports</a>
                <a href="#">Inventory</a>
                <hr>
                <h5>System</h5>
                <a href="#">Admin Panel</a>
                <a href="#">Maintenance</a>
            </div>
            <div class="col-md-10 p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
