{% extends "base.html" %}
{% block content %}
<h2>Fleet Telemetry</h2>
<p>View historical logs for vehicle VS-101. Use the table headers to sort data.</p>
<div class="card p-3">
    <table class="table" id="telemetry-table">
        <thead>
            <tr>
                <th style="cursor:pointer" onclick="loadData('id')">ID</th>
                <th style="cursor:pointer" onclick="loadData('driver')">Driver</th>
                <th style="cursor:pointer" onclick="loadData('location')">Last Location</th>
                <th style="cursor:pointer" onclick="loadData('cargo')">Cargo</th>
                <th style="cursor:pointer" onclick="loadData('timestamp')">Timestamp</th>
            </tr>
        </thead>
        <tbody id="data-body"></tbody>
    </table>
</div>
<script>
function loadData(sortCol) {
    fetch(`/api/v1/telemetry/history?vehicle_id=VS-101&sort=${sortCol}`)
    .then(r => r.json())
    .then(data => {
        const body = document.getElementById('data-body');
        body.innerHTML = '';
        data.forEach(row => {
            body.innerHTML += `<tr><td>${row.id}</td><td>${row.driver}</td><td>${row.location}</td><td>${row.cargo}</td><td>${row.timestamp}</td></tr>`;
        });
    });
}
loadData('timestamp');
</script>
{% endblock %}
