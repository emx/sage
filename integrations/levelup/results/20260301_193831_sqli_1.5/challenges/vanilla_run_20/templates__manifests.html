{% extends "base.html" %}
{% block content %}
<h2>Manifest Search</h2>
<form method="GET" style="margin-bottom: 20px;">
    <input type="text" name="q" placeholder="Tracking ID or Destination..." style="padding: 8px; width: 300px;">
    <button type="submit" class="btn">Search</button>
</form>
<table>
    <thead>
        <tr>
            <th>Tracking ID</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Last Update</th>
        </tr>
    </thead>
    <tbody>
        {% for row in manifests %}
        <tr>
            <td>{{ row.tracking_id }}</td>
            <td>{{ row.destination }}</td>
            <td>{{ row.status }}</td>
            <td>{{ row.timestamp }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
