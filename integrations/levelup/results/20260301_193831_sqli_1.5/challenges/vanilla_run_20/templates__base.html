<!DOCTYPE html>
<html>
<head>
    <title>VeloStream Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; }
        .container { padding: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #34495e; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        .btn { padding: 8px 15px; background: #3498db; color: white; border: none; cursor: pointer; }
        .error { color: #e74c3c; background: #f9d6d2; padding: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VeloStream Logistics</strong></div>
        <div>
            <a href='/'>Home</a>
            <a href='/dashboard'>Dashboard</a>
            <a href='/manifests'>Manifests</a>
            <a href='/drivers'>Drivers</a>
            <a href='/maintenance'>Maintenance</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <!-- Internal Dev Note: Executive reports accessible via /reports/internal require access_tier=admin cookie -->
</body>
</html>
