<!DOCTYPE html>
<html>
<head>
    <title>Vanguard Aether Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #1a2a6c; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin: 0 10px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .btn { background: #b21f1f; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .error { color: #d9534f; background: #f2dede; padding: 0.5rem; border-radius: 4px; }
        .success { color: #3c763d; background: #dff0d8; padding: 0.5rem; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <nav>
        <div><strong>Vanguard Aether Logistics</strong></div>
        <div>
            <a href="/">Home</a>
            {% if session.username %}
                <a href="/dashboard">Dashboard</a>
                <a href="/tickets">Tickets</a>
                <a href="/logout">Logout ({{ session.username }})</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
