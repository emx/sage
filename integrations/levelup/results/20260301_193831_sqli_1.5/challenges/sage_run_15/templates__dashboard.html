{% extends "base.html" %}
{% block content %}
<h2>Active Cargo Manifests</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Manifest ID</th>
                <th>Destination</th>
                <th>Cargo Type</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for m in manifests %}
            <tr>
                <td>{{ m.manifest_id }}</td>
                <td>{{ m.destination }}</td>
                <td>{{ m.cargo_name }}</td>
                <td>{{ m.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div style="margin-top: 20px;">
    <a href="/tickets" class="btn">Manage Support Tickets</a>
</div>
{% endblock %}
