{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Portal Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 10px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px;" required>
        </div>
        <div style="margin-bottom: 10px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Access System</button>
    </form>
    <!-- DEBUG: Temporary guest access for offshore dispatchers - guest:guest_vanguard_2024 -->
</div>
{% endblock %}
