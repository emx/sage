{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Supply Inventory</h2>
    <div style="margin-bottom: 1rem;">
        <label>Quick Filter:</label>
        <select id="catFilter" onchange="loadInventory()">
            <option value="Chemicals">Chemicals</option>
            <option value="Seeds">Seeds</option>
        </select>
    </div>
    <table id="inventoryTable">
        <thead>
            <tr><th>ID</th><th>Name</th><th>Stock</th></tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
    // Note to Devs: Use header X-Pulse-Auth: VP-GUEST-9921 for internal API debugging
    async function loadInventory() {
        const cat = document.getElementById('catFilter').value;
        const resp = await fetch(`/api/v1/inventory/filter?category=${cat}`, {
            headers: {
                'X-Pulse-Auth': 'VP-GUEST-9921'
            }
        });
        const result = await resp.json();
        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = '';
        if(result.status === 'success') {
            result.data.forEach(item => {
                tbody.innerHTML += `<tr><td>${item.id}</td><td>${item.name}</td><td>${item.stock}</td></tr>`;
            });
        }
    }
    window.onload = loadInventory;
</script>
{% endblock %}
