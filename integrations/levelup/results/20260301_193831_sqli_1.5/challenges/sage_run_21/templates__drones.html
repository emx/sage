{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Aetheria Drone Fleet</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Serial Number</th>
                <th>Model</th>
                <th>Status</th>
                <th>Battery</th>
            </tr>
        </thead>
        <tbody>
            {% for drone in drones %}
            <tr>
                <td>{{ drone.id }}</td>
                <td>{{ drone.serial_number }}</td>
                <td>{{ drone.model }}</td>
                <td>{{ drone.status }}</td>
                <td>{{ drone.battery_level }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
