{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 100px auto;">
    <h2>Portal Login</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>
        <div style="margin-bottom: 20px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Authorize Access</button>
    </form>
    <p style="font-size: 0.8rem; color: #7f8c8d; margin-top: 20px;">Unauthorized access is strictly prohibited under the Aetheria Telematics Corporate Charter.</p>
</div>
{% endblock %}
