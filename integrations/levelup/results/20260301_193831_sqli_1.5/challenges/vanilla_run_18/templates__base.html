<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VerdantPath Analytics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #2e7d32; }
        .navbar-brand, .nav-link { color: white !important; }
        .hero-section { background: #e8f5e9; padding: 60px 0; border-bottom: 5px solid #2e7d32; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">VerdantPath</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                {% if session.get('user') %}
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/archive">Harvest Data</a>
                <a class="nav-link" href="/logout">Logout</a>
                {% else %}
                <a class="nav-link" href="/login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
