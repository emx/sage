{% extends "base.html" %}
{% block content %}
<h2>Internal Portal Login</h2>
{% if error %}<div class="alert">{{ error }}</div>{% endif %}
<form method="POST">
    <div style="margin-bottom: 1rem;">
        <label>Username:</label><br>
        <input type="text" name="username" style="width: 100%; padding: 8px;" required>
    </div>
    <div style="margin-bottom: 1rem;">
        <label>Password:</label><br>
        <input type="password" name="password" style="width: 100%; padding: 8px;" required>
    </div>
    <button type="submit" class="btn btn-primary">Access Portal</button>
</form>
{% endblock %}
