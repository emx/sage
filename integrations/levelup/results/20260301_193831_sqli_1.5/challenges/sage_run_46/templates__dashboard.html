{% extends "base.html" %}
{% block content %}
<h2>Coordinator Dashboard</h2>
<p>Welcome back, {{ session.user }}.</p>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 2rem;">
    <div style="background: #ecf0f1; padding: 1.5rem; border-radius: 8px;">
        <h3>Active Manifests</h3>
        <p>12 containers currently in transit.</p>
        <a href="/manifests" class="btn btn-primary">Manage Manifests</a>
    </div>
    <div style="background: #ecf0f1; padding: 1.5rem; border-radius: 8px;">
        <h3>System Health</h3>
        <p>All global hub sensors reporting normal.</p>
        <button class="btn" disabled>View Health Logs</button>
    </div>
</div>
{% endblock %}
