<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloceStream Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin-left: 1rem; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { padding: 0.5rem 1rem; border-radius: 4px; border: none; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #3498db; color: white; }
        .alert { padding: 1rem; background: #e74c3c; color: white; border-radius: 4px; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        footer { text-align: center; padding: 2rem; color: #7f8c8d; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VeloceStream</strong> Logistics</div>
        <div>
            <a href="/">Home</a>
            {% if session.user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/manifests">Manifests</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2024 VeloceStream Logistics Internal Portal v2.4.1 | Support: sysadmin-logistics@velocestream.internal | Debug: guest:guest123
    </footer>
</body>
</html>
