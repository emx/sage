<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AetherFlow - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: #ecf0f1 !important; }
        .footer { background: #2c3e50; color: #bdc3c7; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">AetherFlow Logistics</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/pods">Cargo Pods</a>
                {% if session.username %}
                    <a class="nav-link" href="/settings">Settings</a>
                    <a class="nav-link" href="/logout">Logout ({{ session.username }})</a>
                {% else %}
                    <a class="nav-link" href="/login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4" style="min-height: 70vh;">
        {% block content %}{% endblock %}
    </div>
    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2024 AetherFlow Global Logistics. All systems monitored.</p>
            <small class="text-muted">Guest Access: guest / guest123</small>
        </div>
    </footer>
</body>
</html>
