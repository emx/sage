{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Portal Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Username</label><br>
            <input type="text" name="username" style="width:100%; padding: 5px;" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Password</label><br>
            <input type="password" name="password" style="width:100%; padding: 5px;" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    <p style="font-size: 0.8rem; color: #777; margin-top: 1rem;">Note: Guest access enabled for audit purposes (guest / guest123)</p>
</div>
{% endblock %}
