<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VerdantAxis Analytics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; background: #27ae60; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .header-main { color: #27ae60; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VerdantAxis Analytics</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/inventory">Inventory</a>
            <a href="/chemical-logs">Chemical Logs</a>
            <a href="/status">System Status</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
