<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerdantAxis Logistics | Aegis-Track</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; margin: 0; }
        nav { background: #1a2a3a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #a0d2eb; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        h1, h2 { color: #1a2a3a; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; background: #e0e0e0; }
        .status-active { background: #d4edda; color: #155724; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; letter-spacing: 1px;">VERDANT<b>AXIS</b></div>
        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Shipments</a>
            <a href="/about">About</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2024 VerdantAxis Logistics Systems. All Rights Reserved. Protected by Aegis-Shield WAF.
    </footer>
</body>
</html>
