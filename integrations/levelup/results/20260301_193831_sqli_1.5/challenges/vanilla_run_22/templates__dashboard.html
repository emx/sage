{% extends 'base.html' %}
{% block content %}
<h2>Active Cargo Manifest</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Shipment ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for shipment in shipments %}
            <tr>
                <td>#{{ shipment.tracking_id }}</td>
                <td>{{ shipment.origin }}</td>
                <td>{{ shipment.destination }}</td>
                <td><span class="status-pill status-active">{{ shipment.status }}</span></td>
                <td><a href="/shipment/{{ shipment.id }}">View Details</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
