{% extends 'base.html' %}
{% block content %}
<h2>Shipping Manifests</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Manifest ID</th>
                <th>Container ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Weight (tons)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for m in manifests %}
            <tr>
                <td>{{ m.id }}</td>
                <td>{{ m.container_id }}</td>
                <td>{{ m.origin }}</td>
                <td>{{ m.destination }}</td>
                <td>{{ m.weight }}</td>
                <td><span style="color: #27ae60;">{{ m.status }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
