<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow Logistics - AetherTrack</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #ecf0f1; text-decoration: none; margin-left: 15px; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #2980b9; }
        .alert { padding: 15px; background-color: #f44336; color: white; border-radius: 4px; margin-bottom: 20px; }
        .footer { text-align: center; padding: 20px; color: #777; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: bold; font-size: 1.2rem;">AetherFlow Logistics</div>
        <div>
            {% if session.user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/manifests">Manifests</a>
                <a href="/vessels">Vessels</a>
                <a href="/logout">Logout ({{ session.user }})</a>
            {% else %}
                <a href="/">Home</a>
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        &copy; 2024 AetherFlow Global Logistics & Freight Services. Internal Use Only.
    </div>
</body>
</html>
