{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>System Login</h2>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px;" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px;" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    <p style="font-size: 0.8em; color: #666; margin-top: 10px;">Hint: Use guest / guest123 for audit access.</p>
</div>
{% endblock %}
