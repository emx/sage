<!DOCTYPE html>
<html>
<head>
    <title>Velocita Logistics - Global Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .navbar { background-color: #1e293b; border-bottom: 2px solid #334155; }
        .card { background-color: #1e293b; border: 1px solid #334155; color: white; }
        .table { color: #cbd5e1; }
        .btn-primary { background-color: #3b82f6; border: none; }
        .btn-primary:hover { background-color: #2563eb; }
        .nav-link { color: #94a3b8 !important; }
        .nav-link.active { color: #3b82f6 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand font-monospace" href="/">VELOCITA DYNAMICS</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/shipments">Manifests</a></li>
                    <li class="nav-item"><a class="nav-link" href="/docs">API Docs</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link btn btn-outline-secondary btn-sm" href="/login">Admin Portal</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
