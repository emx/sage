{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2>Personnel Login</h2>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Employee ID</label><br>
            <input type="text" name="username" style="width: 100%; padding: 0.5rem;" placeholder="VG-XXXX" required>
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Access Key</label><br>
            <input type="password" name="password" style="width: 100%; padding: 0.5rem;" required>
        </div>
        <button type="submit" class="btn">Authenticate</button>
    </form>
</div>
{% endblock %}
