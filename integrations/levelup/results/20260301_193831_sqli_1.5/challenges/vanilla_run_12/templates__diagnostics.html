{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Legacy Sensor Diagnostics</h2>
    <p>Use this tool to verify sensor hardware status and calibration logs.</p>
    <div style="margin-bottom: 1rem;">
        <label>Sort By:</label>
        <select id="sortSelect" onchange="loadLogs()">
            <option value="timestamp">Timestamp</option>
            <option value="temperature">Temperature</option>
            <option value="id">Internal ID</option>
        </select>
    </div>
    <table id="logTable">
        <thead>
            <tr>
                <th>Log ID</th>
                <th>Sensor ID</th>
                <th>Temp (C)</th>
                <th>Status</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
function loadLogs() {
    const sort = document.getElementById('sortSelect').value;
    fetch(`/api/v1/diagnostics/logs?sort=${sort}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#logTable tbody');
            tbody.innerHTML = '';
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:red">${data.error}</td></tr>`;
                return;
            }
            data.forEach(log => {
                const row = `<tr>
                    <td>${log.id}</td>
                    <td>${log.sensor_id}</td>
                    <td>${log.temperature}</td>
                    <td><span class="status-ok">${log.status}</span></td>
                    <td>${log.timestamp}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        });
}
window.onload = loadLogs;
</script>
{% endblock %}
