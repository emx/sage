{% extends 'base.html' %}
{% block content %}
<h2>Recent Harvest Logs</h2>
<div class="card">
    <table>
        <tr>
            <th>Batch ID</th>
            <th>Crop Type</th>
            <th>Yield (kg)</th>
            <th>Quality Grade</th>
        </tr>
        {% for harvest in harvests %}
        <tr>
            <td>{{ harvest.batch_id }}</td>
            <td>{{ harvest.crop_type }}</td>
            <td>{{ harvest.yield_amount }}</td>
            <td>{{ harvest.grade }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
