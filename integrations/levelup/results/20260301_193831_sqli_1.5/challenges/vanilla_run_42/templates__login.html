{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Terminal Access</h2>
    {% if error %}<p class="alert">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: white;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Access Key</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: white;">
        </div>
        <button type="submit" class="btn">Authorize</button>
    </form>
    <p style="font-size: 0.8rem; color: #8b949e; margin-top: 1rem;">Public Access: guest / guest123</p>
</div>
{% endblock %}
