{% extends 'base.html' %}
{% block content %}
<h2>Launch Schedules</h2>
<table>
    <thead><tr><th>Mission</th><th>Launch Date</th><th>Pad</th><th>Payload</th></tr></thead>
    <tbody>
        {% for launch in launches %}
        <tr>
            <td>{{ launch.mission_name }}</td>
            <td>{{ launch.launch_date }}</td>
            <td>{{ launch.pad_location }}</td>
            <td>{{ launch.payload_description }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
