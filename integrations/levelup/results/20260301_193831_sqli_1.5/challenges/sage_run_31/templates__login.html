{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Staff Login</h2>
    <p style="color: #ff4757;">{{ message }}</p>
    <form>
        <input type="text" placeholder="Employee ID" disabled style="width: 100%; margin-bottom: 10px; padding: 8px;"><br>
        <input type="password" placeholder="Password" disabled style="width: 100%; margin-bottom: 10px; padding: 8px;"><br>
        <button type="button" style="width: 100%; padding: 10px; background: #2d343f; border: none; color: white;">Login</button>
    </form>
</div>
{% endblock %}
