<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AetherLogix Orbital - Internal Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #2d343f; }
        nav a { color: #00a8ff; margin-right: 20px; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; border: 1px solid #2d343f; text-align: left; }
        th { background: #1a1f29; color: #00a8ff; }
        .card { background: #1a1f29; padding: 1.5rem; border-radius: 8px; border: 1px solid #2d343f; }
        footer { margin-top: 3rem; padding: 1rem; font-size: 0.8rem; color: #5c6370; text-align: center; border-top: 1px solid #2d343f; }
        footer a { color: #5c6370; text-decoration: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/inventory">Component Inventory</a>
        <a href="/schedules">Launch Schedules</a>
        <a href="/login">Staff Login</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2024 AetherLogix Orbital Systems | <a href="/diagnostics">Internal Diagnostics</a>
    </footer>
</body>
</html>
