<!DOCTYPE html>
<html>
<head>
    <title>AetherLink Dynamics | Telemetry Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0e14; color: #e0e6ed; margin: 0; }
        nav { background-color: #1a1f29; padding: 1rem; border-bottom: 2px solid #2d3748; display: flex; justify-content: space-between; }
        nav a { color: #a0aec0; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #63b3ed; }
        .container { padding: 40px; max-width: 1000px; margin: auto; }
        .card { background-color: #1a1f29; padding: 25px; border-radius: 8px; border: 1px solid #2d3748; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #2d3748; border: 1px solid #4a5568; color: white; border-radius: 4px; }
        button { background-color: #3182ce; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2b6cb0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #2d3748; }
        th { color: #63b3ed; }
        .alert { color: #fc8181; background: #2d1a1a; padding: 10px; border-radius: 4px; border: 1px solid #631717; }
        .success { color: #68d391; background: #1a2d1e; padding: 10px; border-radius: 4px; border: 1px solid #17632a; }
    </style>
</head>
<body>
    <nav>
        <div><span style="color:#63b3ed">AETHER</span>LINK</div>
        <div>
            <a href="/">Home</a>
            {% if session.user_id %}
                <a href="/dashboard">Dashboard</a>
                <a href="/telemetry">Telemetry</a>
                <a href="/fleet">Fleet Status</a>
                <a href="/profile">Account Settings</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Client Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
