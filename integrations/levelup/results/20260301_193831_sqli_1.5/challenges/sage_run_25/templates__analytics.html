{% extends 'base.html' %}
{% block content %}
<h2>Harvest Analytics</h2>
<div class="card p-3 mb-4">
    <div class="row">
        <div class="col-md-4">
            <label>Region</label>
            <select id="regionSelect" class="form-select">
                {% for region in regions %}
                <option value="{{ region.id }}">{{ region.name }} ({{ region.climate }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label>Sort By</label>
            <select id="sortSelect" class="form-select">
                <option value="year">Year</option>
                <option value="yield_amount">Yield Amount</option>
                <option value="crop_type">Crop Type</option>
            </select>
        </div>
    </div>
</div>

<table class="table table-hover bg-white shadow-sm">
    <thead class="table-dark"><tr><th>Year</th><th>Crop</th><th>Yield (tons)</th></tr></thead>
    <tbody id="dataTable"></tbody>
</table>

<script>
    function loadData() {
        const regionId = document.getElementById('regionSelect').value;
        const sort = document.getElementById('sortSelect').value;
        fetch(`/api/v1/yield_data?region_id=${regionId}&sort=${sort}`)
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('dataTable');
                tbody.innerHTML = '';
                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-danger">${data.error}</td></tr>`;
                    return;
                }
                data.forEach(row => {
                    tbody.innerHTML += `<tr><td>${row.year}</td><td>${row.crop_type}</td><td>${row.yield_amount}</td></tr>`;
                });
            });
    }
    document.getElementById('regionSelect').onchange = loadData;
    document.getElementById('sortSelect').onchange = loadData;
    loadData();
</script>
{% endblock %}
