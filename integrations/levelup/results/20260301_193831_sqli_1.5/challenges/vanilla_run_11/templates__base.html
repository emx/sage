<!DOCTYPE html>
<html>
<head>
    <title>AetherFlow Avionics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e1e1e1; margin: 0; }
        nav { background: #16213e; padding: 1rem; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; }
        nav a { color: #4ecca3; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 40px; max-width: 1000px; margin: auto; }
        .card { background: #16213e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #4ecca3; }
        .btn { background: #4ecca3; color: #1a1a2e; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .alert { color: #e94560; background: rgba(233, 69, 96, 0.1); padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">AetherFlow</a>
            {% if session.user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/manifests">Manifests</a>
            {% endif %}
        </div>
        <div>
            {% if session.user %}
            <span>Welcome, {{ session.user }}</span>
            <a href="/logout">Logout</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
