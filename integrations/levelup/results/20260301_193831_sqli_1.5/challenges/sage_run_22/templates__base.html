<!DOCTYPE html>
<html>
<head>
    <title>NebulaStream Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 10px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .btn { background: #3498db; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        input { padding: 0.5rem; width: 100%; box-sizing: border-box; margin: 0.5rem 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .verified { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <nav>
        <div><strong>NebulaStream Streamline</strong></div>
        <div>
            <a href="/">Home</a>
            {% if session.user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/shipments">Shipments</a>
                <a href="/verify">Verification</a>
                <a href="/logout">Logout ({{ session.user }})</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
