{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Manifest Verification Tool</h2>
    <p>Verify container serial numbers against the central NebulaStream Registry.</p>
    <div style="margin: 20px 0;">
        <input type="text" id="serialInput" placeholder="Enter Serial (e.g., NS-1001)" style="width: 70%;">
        <button onclick="verify()" class="btn">Verify Serial</button>
    </div>
    <div id="result"></div>
</div>

<script>
async function verify() {
    const serial = document.getElementById('serialInput').value;
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Checking...';
    
    try {
        const resp = await fetch('/api/v1/manifest/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ serial: serial })
        });
        
        const data = await resp.json();
        if (resp.ok) {
            resultDiv.innerHTML = `<p class="verified">MATCH FOUND: Manifest ID ${data.manifest_id} is active.</p>`;
        } else {
            resultDiv.innerHTML = `<p class="error">${data.error || data.message || 'Verification Failed'}</p>`;
        }
    } catch (e) {
        resultDiv.innerHTML = '<p class="error">An unexpected error occurred.</p>';
    }
}
</script>
{% endblock %}
