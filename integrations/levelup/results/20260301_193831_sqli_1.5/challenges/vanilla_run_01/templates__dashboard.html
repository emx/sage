{% extends "base.html" %}
{% block content %}
<h1>Welcome, {{ user }}</h1>
<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
    <div class="card">
        <h3>Active Shipments</h3>
        <p style="font-size: 2rem; color: #27ae60;">1,248</p>
    </div>
    <div class="card">
        <h3>Fleet Status</h3>
        <p style="font-size: 2rem; color: #2980b9;">98% Nominal</p>
    </div>
    <div class="card">
        <h3>System Integrity</h3>
        <p style="font-size: 2rem; color: #f39c12;">Secured</p>
    </div>
</div>
{% endblock %}
