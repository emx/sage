<!DOCTYPE html>
<html>
<head>
    <title>VeloSync Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        input[type=text], button { padding: 10px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #3498db; color: white; cursor: pointer; border: none; }
        .alert { color: #c0392b; background: #f9d6d2; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav>
        <strong>VeloSync Logistics Portal</strong>
        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/fleet">Fleet Management</a>
            <a href="/vessels">Vessels</a>
            <a href="/settings">Settings</a>
            <a href="/login">Logout</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
