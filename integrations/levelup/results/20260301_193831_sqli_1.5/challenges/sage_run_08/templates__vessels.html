{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>International Vessel Manifests</h2>
    <table>
        <thead>
            <tr><th>Ship Name</th><th>Origin</th><th>Destination</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for manifest in manifests %}
            <tr>
                <td>{{ manifest.ship_name }}</td>
                <td>{{ manifest.origin }}</td>
                <td>{{ manifest.destination }}</td>
                <td>{{ manifest.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
