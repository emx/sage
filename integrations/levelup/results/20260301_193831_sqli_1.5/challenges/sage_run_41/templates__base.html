<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NebulaStream Avionics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #ecf0f1; cursor: pointer; }
        .btn { background: #3498db; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div><strong>NebulaStream Avionics</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/inventory">Inventory</a>
            <a href="/maintenance">Maintenance</a>
            <a href="/login">Staff Login</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
