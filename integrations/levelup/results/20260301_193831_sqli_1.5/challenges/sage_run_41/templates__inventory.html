{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h1>Global Inventory</h1>
    <p>Real-time tracking of critical aircraft components.</p>
    <table id="inventoryTable">
        <thead>
            <tr>
                <th onclick="fetchSorted('id')">ID</th>
                <th onclick="fetchSorted('name')">Part Name</th>
                <th onclick="fetchSorted('category')">Category</th>
                <th onclick="fetchSorted('stock_level')">Stock</th>
            </tr>
        </thead>
        <tbody>
            {% for part in parts %}
            <tr>
                <td>{{ part.id }}</td>
                <td>{{ part.name }}</td>
                <td>{{ part.category }}</td>
                <td>{{ part.stock_level }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
function fetchSorted(col) {
    fetch(`/api/v1/inventory/filter?sort=${col}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const row = `<tr><td>${item.id}</td><td>${item.name}</td><td>${item.category}</td><td>${item.stock_level}</td></tr>`;
                tbody.innerHTML += row;
            });
        });
}
</script>
{% endblock %}
