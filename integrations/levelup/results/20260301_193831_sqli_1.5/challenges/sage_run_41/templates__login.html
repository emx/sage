{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Staff Login</h2>
    {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Employee ID</label><br>
            <input type="text" style="width: 100%; padding: 8px;" disabled>
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Security Key</label><br>
            <input type="password" style="width: 100%; padding: 8px;" disabled>
        </div>
        <button type="button" class="btn" disabled>Login</button>
    </form>
</div>
{% endblock %}
