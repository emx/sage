{% extends 'base.html' %}
{% block content %}
<h1>Silo Telemetry</h1>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Silo Name</th>
                <th>Fill Level</th>
                <th>Temperature</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for silo in silos %}
            <tr>
                <td>{{ silo.silo_name }}</td>
                <td>{{ silo.fill_level }}%</td>
                <td>{{ silo.temperature }}°C</td>
                <td><span style="color: green;">● Online</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
