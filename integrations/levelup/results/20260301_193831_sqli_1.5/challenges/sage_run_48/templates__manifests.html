{% extends 'base.html' %}
{% block content %}
<h1>Transport Manifests</h1>
<div class="card">
    <form method="GET">
        <input type="text" name="q" placeholder="Search item...">
        <button type="submit">Search</button>
    </form>
</div>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Item</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for record in records %}
        <tr>
            <td>{{ record.id }}</td>
            <td>{{ record.item }}</td>
            <td>{{ record.origin }}</td>
            <td>{{ record.destination }}</td>
            <td>{{ record.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
