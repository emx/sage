{% extends "base.html" %}
{% block content %}
<h2>Concierge Dashboard</h2>
<p>Welcome back, {{ user.username }}.</p>
<div class="card">
    <h3>Active Itineraries</h3>
    {% if bookings %}
        <ul>
        {% for b in bookings %}
            <li>{{ b.name }} - Status: <strong>{{ b.status }}</strong></li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No active reservations.</p>
    {% endif %}
</div>
{% endblock %}
