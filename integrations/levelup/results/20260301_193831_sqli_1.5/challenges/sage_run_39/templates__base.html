<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetheron Nexus - Aerospace Systems</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #2a313d; display: flex; gap: 20px; }
        nav a { color: #00a8ff; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: #1a1f29; padding: 1.5rem; border-radius: 8px; border-left: 4px solid #00a8ff; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a313d; }
        th { color: #00a8ff; }
        .btn { background: #00a8ff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .alert { color: #ff4d4d; }
    </style>
</head>
<body>
    <nav>
        <span style="color: #fff; margin-right: 20px;">Aetheron <strong>Nexus</strong></span>
        <a href="/">Home</a>
        {% if session.user %}
        <a href="/dashboard">Dashboard</a>
        <a href="/telemetry">Telemetry</a>
        <a href="/inventory">Inventory</a>
        {% else %}
        <a href="/login">Login</a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
