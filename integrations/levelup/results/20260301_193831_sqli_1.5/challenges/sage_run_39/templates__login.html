{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>System Authentication</h2>
    {% if error %}<p class="alert">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label>Personnel ID:</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px; background: #0b0e14; border: 1px solid #2a313d; color: #fff;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Security Key:</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px; background: #0b0e14; border: 1px solid #2a313d; color: #fff;">
        </div>
        <button type="submit" class="btn">Authorize</button>
    </form>
    <p style="font-size: 0.8rem; color: #666; margin-top: 1rem;">Standard Engineer credentials required for access.</p>
</div>
{% endblock %}
