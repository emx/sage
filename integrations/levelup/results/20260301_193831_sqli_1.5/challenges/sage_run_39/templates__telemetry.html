{% extends 'base.html' %}
{% block content %}
<h1>Satellite Telemetry Logs</h1>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Satellite</th>
                <th>Timestamp</th>
                <th>Reading</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.satellite_name }}</td>
                <td>{{ log.timestamp }}</td>
                <td>{{ log.reading_type }}</td>
                <td>{{ log.value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
