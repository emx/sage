{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Operator Dashboard</h1>
    <p>Welcome back, <strong>{{ session.user }}</strong>.</p>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
        <div class="card" style="background: #e9ecef;">
            <h3>Manifest Search</h3>
            <p>Query the global manifest database for container status.</p>
            <a href="/search" class="btn">Search Tools</a>
        </div>
        <div class="card" style="background: #e9ecef;">
            <h3>System Status</h3>
            <p>Node: Atlantic-V4<br>Status: <span style="color: green;">Operational</span></p>
        </div>
    </div>
</div>
{% endblock %}
