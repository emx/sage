<!DOCTYPE html>
<html>
<head>
    <title>AetherBound Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #30363d; display: flex; justify-content: space-between; }
        nav a { color: #58a6ff; margin-right: 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 1.5rem; border-radius: 6px; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #30363d; }
        th { color: #8b949e; }
        .btn { background: #238636; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .error { color: #f85149; background: rgba(248, 81, 73, 0.1); padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">AetherBound Home</a>
            <a href="/tracking">Public Tracking</a>
        </div>
        <div>
            {% if session.get('user') %}
                <span>Welcome, {{ session['user'] }}</span>
                <a href="/dashboard" style="margin-left:15px">Dashboard</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Staff Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
