{% extends 'base.html' %}
{% block content %}
<h1 class="title">Shipment Manifest Search</h1>
<table class="table is-fullwidth is-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Tracking No</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for shipment in shipments %}
        <tr>
            <td>{{ shipment.id }}</td>
            <td>{{ shipment.tracking_id }}</td>
            <td>{{ shipment.destination }}</td>
            <td><span class="tag is-info">{{ shipment.status }}</span></td>
            <td><a href="/shipment/{{ shipment.id }}">Details</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
