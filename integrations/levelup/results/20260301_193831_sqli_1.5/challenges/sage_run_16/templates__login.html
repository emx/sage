{% extends 'base.html' %}
{% block content %}
<div class="columns is-centered">
    <div class="column is-4">
        <h2 class="title">Officer Login</h2>
        <form method="POST">
            <div class="field">
                <label class="label">Username</label>
                <div class="control"><input class="input" type="text" name="username" placeholder="guest"></div>
            </div>
            <div class="field">
                <label class="label">Password</label>
                <div class="control"><input class="input" type="password" name="password" placeholder="guest123"></div>
            </div>
            {% if error %}<p class="help is-danger">{{ error }}</p>{% endif %}
            <div class="control"><button class="button is-link is-fullwidth">Login</button></div>
        </form>
    </div>
</div>
{% endblock %}
