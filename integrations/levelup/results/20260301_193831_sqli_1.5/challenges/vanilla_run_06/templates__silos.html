{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h1>Silo Capacity Overview</h1>
    <table>
        <thead>
            <tr>
                <th>Silo ID</th>
                <th>Designation</th>
                <th>Grain Type</th>
                <th>Fill Level</th>
                <th>Capacity</th>
            </tr>
        </thead>
        <tbody>
            {% for silo in silos %}
            <tr>
                <td>{{ silo.id }}</td>
                <td>{{ silo.name }}</td>
                <td>{{ silo.grain_type }}</td>
                <td>{{ silo.fill_level }}%</td>
                <td>{{ silo.capacity }} Tons</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
