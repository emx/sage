{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Active Delivery Windows</h2>
    <table class="table table-hover mt-3">
        <thead>
            <tr>
                <th>Destination Orbit</th>
                <th>Launch Window</th>
                <th>Payload Class</th>
            </tr>
        </thead>
        <tbody>
            {% for s in shipments %}
            <tr>
                <td>{{ s.destination }}</td>
                <td>{{ s.launch_window }}</td>
                <td>{{ s.payload_weight }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
