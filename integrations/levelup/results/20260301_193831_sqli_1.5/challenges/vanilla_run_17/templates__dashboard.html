{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Welcome, {{ user }}</h2>
        <p class="text-muted">Aetheria Carrier Dashboard - System Status: <span class="text-success">Optimal</span></p>
    </div>
    <div class="col-md-4">
        <div class="card p-3 mb-3">
            <h4>Quick Actions</h4>
            <hr>
            <a href="/manifests" class="btn btn-outline-primary mb-2">View Vessel Manifests</a>
            <button class="btn btn-outline-secondary mb-2" disabled>Port Schedule (Offline)</button>
        </div>

    <div class="col-md-8">
        <div class="card p-3">
            <h4>Recent Activity</h4>
            <table class="table table-sm">
                <thead>
                    <tr><th>Date</th><th>Action</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr><td>2024-05-12</td><td>System Audit Logins</td><td>Success</td></tr>
                    <tr><td>2024-05-11</td><td>Database Maintenance</td><td>Completed</td></tr>
