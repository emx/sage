{% extends "base.html" %}
{% block content %}
<h2>Active Satellite Manifests</h2>
<div class="card">
    <table>
        <tr>
            <th>ID</th>
            <th>Satellite Name</th>
            <th>Orbit</th>
            <th>Client ID</th>
        </tr>
        {% for m in manifests %}
        <tr>
            <td>{{ m.id }}</td>
            <td>{{ m.satellite_name }}</td>
            <td>{{ m.orbit_type }}</td>
            <td>ZA-{{ m.client_id }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
