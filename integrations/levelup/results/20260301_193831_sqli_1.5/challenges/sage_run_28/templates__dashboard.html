{% extends "base.html" %}
{% block content %}
<h2>Personnel Dashboard</h2>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h3>Telemetry Audit</h3>
        <p>Perform health checks on specific ground stations and orbital nodes.</p>
        <form action="/portal/telemetry/check" method="GET">
            <input type="number" name="node_id" placeholder="Node ID (e.g. 1)" style="padding: 8px; width: 100px;">
            <button type="submit" class="btn">Check Node</button>
        </form>
    </div>
    <div class="card">
        <h3>Manifest Management</h3>
        <p>Access restricted to Senior Logistics Officers.</p>
        <button class="btn" style="background: #444; cursor: not-allowed;">Locked</button>
    </div>
</div>
{% endblock %}
