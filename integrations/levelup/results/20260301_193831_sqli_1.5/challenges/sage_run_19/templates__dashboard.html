{% extends 'base.html' %}
{% block content %}
<h1>Live Drone Status</h1>
<div class="card">
    <table>
        <tr><th>Drone ID</th><th>Model</th><th>Battery</th><th>Status</th></tr>
        {% for drone in drones %}
        <tr>
            <td>{{ drone.drone_id }}</td>
            <td>{{ drone.model }}</td>
            <td>{{ drone.battery_level }}%</td>
            <td class="status-active">{{ drone.status }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
