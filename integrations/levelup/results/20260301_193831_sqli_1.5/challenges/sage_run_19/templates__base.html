<!DOCTYPE html>
<html>
<head>
    <title>VeloStratus Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin: 0 10px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .status-active { color: #27ae60; font-weight: bold; }
        .status-maint { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VeloStratus Logistics</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/flights">Flights</a>
            <a href="/inventory">Inventory</a>
            <a href="/pilots">Pilots</a>
            <a href="/maintenance">Maintenance</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
