{% extends 'base.html' %}
{% block content %}
<h1>Drone Maintenance Logs</h1>
<div class="card">
    <div style="margin-bottom: 15px;">
        <label>Sort By: </label>
        <select id="sortSelect" onchange="loadLogs()">
            <option value="date">Date</option>
            <option value="cost">Cost</option>
            <option value="drone_id">Drone ID</option>
        </select>
    </div>
    <table id="maintTable">
        <thead>
            <tr><th>Drone ID</th><th>Description</th><th>Date</th><th>Cost ($)</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<script>
function loadLogs() {
    const sort = document.getElementById('sortSelect').value;
    fetch(`/api/v1/logistics/maintenance?sort=${sort}`)
        .then(r => r.json())
        .then(data => {
            const tbody = document.querySelector('#maintTable tbody');
            tbody.innerHTML = '';
            data.forEach(row => {
                tbody.innerHTML += `<tr><td>${row.drone_id}</td><td>${row.description}</td><td>${row.date}</td><td>${row.cost}</td></tr>`;
            });
        });
}
window.onload = loadLogs;
</script>
{% endblock %}
