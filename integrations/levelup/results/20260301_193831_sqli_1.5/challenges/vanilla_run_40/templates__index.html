{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h1>System Overview</h1>
<div class="card">
    <h3>Operational Statistics</h3>
    <p>Connected Nodes: 14</p>
    <p>Pending Shipments: 3</p>
    <p>Storage Capacity: 84%</p>
</div>
<div class="card">
    <h3>Real-time Telemetry Status</h3>
    <div id="telemetry-feed">Loading sensor data...</div>
</div>
<script>
    fetch('/api/v1/telemetry?node_id=1&sort=last_reading')
        .then(r => r.json())
        .then(data => {
            let html = '<table><tr><th>ID</th><th>Sensor</th><th>Reading</th><th>Status</th></tr>';
            data.forEach(row => {
                html += `<tr><td>${row.id}</td><td>${row.sensor_type}</td><td>${row.last_reading}</td><td class="status-ok">${row.status}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('telemetry-feed').innerHTML = html;
        });
</script>
{% endblock %}
