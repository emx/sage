{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Cargo Manifest Archive</h2>
    <form method="GET">
        <input type="text" name="q" placeholder="Manifest ID or Destination..." style="padding: 8px; width: 300px;">
        <button type="submit" class="btn">Search</button>
    </form>
    <table>
        <thead>
            <tr><th>ID</th><th>Destination</th><th>Priority</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for m in manifests %}
            <tr>
                <td>{{ m.manifest_id }}</td>
                <td>{{ m.destination }}</td>
                <td>{{ m.priority }}</td>
                <td>{{ m.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
