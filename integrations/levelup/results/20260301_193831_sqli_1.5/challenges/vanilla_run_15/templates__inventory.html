{% extends 'base.html' %}
{% block content %}
<h2>Component Inventory</h2>
<div class="card">
    <input type="text" id="search" placeholder="Search components (e.g. Raptor, Valve)..." style="width: 70%; padding: 10px;">
    <button onclick="doSearch()" class="btn">Search</button>
    <div id="results"></div>
</div>
<script>
function doSearch() {
    const q = document.getElementById('search').value;
    fetch('/api/v1/inventory/search?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
            let html = '<table><tr><th>ID</th><th>Name</th><th>Serial</th><th>Weight (kg)</th></tr>';
            if (data.error) {
                html = '<p class="alert">Error: ' + data.details + '</p>';
            } else {
                data.forEach(row => {
                    html += `<tr><td>${row.id}</td><td>${row.name}</td><td>${row.serial}</td><td>${row.weight}</td></tr>`;
                });
                html += '</table>';
            }
            document.getElementById('results').innerHTML = html;
        });
}
</script>
{% endblock %}
