<!DOCTYPE html>
<html>
<head>
    <title>AstraVantage Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin-left: 20px; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .alert { color: #e74c3c; background: #fadbd8; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <strong>AstraVantage VantagePoint</strong>
        <div>
            {% if session.user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/inventory">Inventory</a>
            <a href="/suppliers">Suppliers</a>
            <a href="/shipping">Shipping</a>
            <a href="/logout">Logout</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
