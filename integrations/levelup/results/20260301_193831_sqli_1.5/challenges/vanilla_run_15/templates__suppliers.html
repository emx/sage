{% extends 'base.html' %}
{% block content %}
<h2>Supplier Directory</h2>
<div class="card">
    <table>
        <tr><th>Supplier Name</th><th>Contact Email</th><th>Certification</th></tr>
        {% for s in suppliers %}
        <tr><td>{{ s.name }}</td><td>{{ s.email }}</td><td>{{ s.cert_level }}</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
