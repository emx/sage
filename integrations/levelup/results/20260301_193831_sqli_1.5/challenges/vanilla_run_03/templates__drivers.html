{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Driver Certifications</h2>
    <table>
        <thead>
            <tr><th>Driver Name</th><th>License Number</th><th>Region</th><th>Exp. Date</th></tr>
        </thead>
        <tbody>
            {% for d in drivers %}
            <tr>
                <td>{{ d.full_name }}</td>
                <td>{{ d.license_id }}</td>
                <td>{{ d.region }}</td>
                <td>{{ d.expiry_date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
