{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Dispatcher Login</h2>
    {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom:1rem">
            <label>Username</label><br>
            <input type="text" name="username" style="width:100%" required>
        </div>
        <div style="margin-bottom:1rem">
            <label>Password</label><br>
            <input type="password" name="password" style="width:100%" required>
        </div>
        <button type="submit" style="width:100%; padding: 0.5rem; background: #2c3e50; color: white; border: none;">Access Portal</button>
    </form>
    <p style="font-size: 0.8rem; color: #666; margin-top: 1rem;">Internal Note: Temporary password for new dispatchers is 'password123'</p>
</div>
{% endblock %}
