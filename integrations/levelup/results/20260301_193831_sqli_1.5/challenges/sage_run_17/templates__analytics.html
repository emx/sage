{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Fleet Analytics Dashboard</h2>
    <div style="margin-bottom: 10px;">
        Sort By: 
        <select id="sortSelect" onchange="loadData()">
            <option value="id">Manifest ID</option>
            <option value="source_city">Origin City</option>
            <option value="destination">Destination</option>
            <option value="ship_state">Status</option>
        </select>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tracking ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="shipmentBody"></tbody>
    </table>
</div>
<script>
function loadData() {
    const sort = document.getElementById('sortSelect').value;
    fetch(`/api/v1/shipments/analytics?sort=${sort}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('shipmentBody');
            tbody.innerHTML = '';
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:red">Error: ${data.error}</td></tr>`;
                return;
            }
            data.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.id}</td>
                    <td>${item.tracking_id}</td>
                    <td>${item.source_city}</td>
                    <td>${item.destination}</td>
                    <td>${item.ship_state}</td>
                </tr>`;
            });
        });
}
window.onload = loadData;
</script>
{% endblock %}
