{% extends 'base.html' %}
{% block content %}
<h2>Drone Inventory</h2>
<div class='card'>
    <table>
        <thead>
            <tr><th>Serial</th><th>Model</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for drone in drones %}
            <tr>
                <td>{{ drone.serial }}</td>
                <td>{{ drone.model }}</td>
                <td>{{ drone.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
