{% extends 'base.html' %}
{% block content %}
<h2>Maintenance Records</h2>
<div class='card'>
    <div style='margin-bottom: 20px;'>
        <label>Sort By:</label>
        <select id='sort_param' onchange='loadRecords()'>
            <option value='timestamp'>Date</option>
            <option value='drone_id'>Serial Number</option>
            <option value='technician_id'>Technician</option>
        </select>
    </div>
    <table id='records_table'>
        <thead>
            <tr><th>Date</th><th>Serial</th><th>Technician</th><th>Service Rendered</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<script>
function loadRecords() {
    const sort = document.getElementById('sort_param').value;
    fetch(`/api/v1/records/filter?sort=${sort}`)
        .then(r => r.json())
        .then(data => {
            const body = document.querySelector('#records_table tbody');
            body.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.timestamp}</td><td>${row.drone_id}</td><td>${row.technician_id}</td><td>${row.description}</td>`;
                body.appendChild(tr);
            });
        });
}
window.onload = loadRecords;
</script>
{% endblock %}
