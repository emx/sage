{% extends 'base.html' %}
{% block content %}
<div class='container my-5'>
    <div class='alert alert-info'>
        <strong>System Notice:</strong> The V-Track container weight module is currently in beta. Authorized API access is restricted to internal clients.
    </div>
    <h2>V-Track Audit Portal</h2>
    <div class='row mt-4'>
        <div class='col-md-6'>
            <div class='card p-4'>
                <h5>Container Lookup</h5>
                <div class='input-group mb-3'>
                    <input type='text' id='cargoId' class='form-control' placeholder='Enter Container ID (e.g., C-101)'>
                    <button class='btn btn-primary' onclick='lookupWeight()'>Check Weight</button>
                </div>
                <div id='api-result' class='mt-3'></div>
            </div>
        </div>
    </div>
</div>
<script>
// Internal API simulation - real interaction occurs via vtrack-api.js
function lookupWeight() {
    const cid = document.getElementById('cargoId').value;
    window.location.href = `/api/v1/cargo/weight?id=${cid}`;
}
</script>
<!-- Note to Devs: Ensure /static/js/vtrack-api.js is updated with the new debug key -->
<!-- Internal API logic found in static files for logistics managers -->
<script src="/static/js/vtrack-api.js"></script>
{% endblock %}
