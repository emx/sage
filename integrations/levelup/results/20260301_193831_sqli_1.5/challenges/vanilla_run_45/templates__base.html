<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Velocis Maritime Solutions</title>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css'>
    <style>
        body { background-color: #f4f7f9; }
        .navbar { background-color: #002b49; }
        .navbar-brand, .nav-link { color: #ffffff !important; }
        .hero { background: linear-gradient(rgba(0,43,73,0.8), rgba(0,43,73,0.8)), url('https://images.unsplash.com/photo-1570535175903-705b6c292722?auto=format&fit=crop&q=80&w=1200'); background-size: cover; color: white; padding: 60px 0; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        footer { background: #002b49; color: white; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
    <nav class='navbar navbar-expand-lg'>
        <div class='container'>
            <a class='navbar-brand' href='/'>VELOCIS MARITIME</a>
            <div class='navbar-nav'>
                <a class='nav-link' href='/'>Home</a>
                <a class='nav-link' href='/fleet'>Fleet</a>
                <a class='nav-link' href='/v-track/portal'>V-Track Portal</a>
                <a class='nav-link' href='/about'>About</a>
                <a class='nav-link' href='/support'>Support</a>
            </div>
        </div>
    </nav>
    <div class='content'>{% block content %}{% endblock %}</div>
    <footer>
        <div class='container text-center'>
            &copy; 2024 Velocis Maritime Solutions - Internal Logistics Network
        </div>
    </footer>
    <script src='/static/js/main.js'></script>
</body>
</html>
