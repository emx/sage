<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AetherFlow Aerospace</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #30363d; display: flex; gap: 20px; }
        nav a { color: #58a6ff; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #30363d; }
        .status-active { color: #3fb950; font-weight: bold; }
        .status-offline { color: #f85149; font-weight: bold; }
        footer { margin-top: 3rem; padding: 1rem; font-size: 0.8rem; color: #8b949e; text-align: center; border-top: 1px solid #30363d; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/catalog">Component Catalog</a>
        <a href="/procurement">Staff Login</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2024 AetherFlow Aerospace - Internal Systems | <a href="/maintenance" style="color:#444;">Maintenance Portal</a>
    </footer>
</body>
</html>
