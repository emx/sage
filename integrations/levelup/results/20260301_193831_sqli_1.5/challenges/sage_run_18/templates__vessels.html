{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <h2>Global Vessel Registry</h2>
    <table class="table mt-4 bg-white">
        <thead>
            <tr>
                <th>ID</th>
                <th>Vessel Name</th>
                <th>Registry</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for vessel in vessels %}
            <tr>
                <td>{{ vessel.id }}</td>
                <td>{{ vessel.name }}</td>
                <td>{{ vessel.registry }}</td>
                <td><span class="badge bg-success">Active</span></td>
                <td><button class="btn btn-sm btn-primary" onclick="fetchDetails('{{ vessel.id }}')">View Details</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div id="detail-view" class="mt-4 p-4 border rounded bg-light" style="display:none;">
        <h4>Vessel Details</h4>
        <pre id="json-out"></pre>
    </div>
</div>
<script>
function fetchDetails(id) {
    fetch('/api/v1/vessel/details?id=' + id, {
        headers: {
            'X-Audit-ID': '1'
        }
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('json-out').innerText = JSON.stringify(data, null, 2);
    });
}
</script>
{% endblock %}
