{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <h2>Container Tracking</h2>
    <div class="row">
        {% for container in containers %}
        <div class="col-md-3 mb-3">
            <div class="card p-3">
                <small class="text-muted">{{ container.serial }}</small>
                <strong>{{ container.contents }}</strong>
                <p class="mb-0">Origin: {{ container.origin }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
