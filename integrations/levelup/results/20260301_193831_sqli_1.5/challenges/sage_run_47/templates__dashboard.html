{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Active Shipment Manifests</h2>
    <p>Sorted by current logistics priority.</p>
    <table id="shipmentTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="shipmentBody">
            <!-- Loaded via API -->
        </tbody>
    </table>
</div>

<script>
    async function loadShipments() {
        const response = await fetch('/api/shipments/search?sort=origin');
        const data = await response.json();
        const body = document.getElementById('shipmentBody');
        body.innerHTML = '';
        data.forEach(s => {
            body.innerHTML += `<tr><td>${s.id}</td><td>${s.origin}</td><td>${s.destination}</td><td>${s.status}</td></tr>`;
        });
    }
    loadShipments();
</script>
{% endblock %}
