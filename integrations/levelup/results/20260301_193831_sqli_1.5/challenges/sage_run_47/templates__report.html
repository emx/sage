{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Shipment Detail #{{ report.id }}</h2>
    <p><strong>Origin:</strong> {{ report.origin }}</p>
    <p><strong>Destination:</strong> {{ report.destination }}</p>
    <p><strong>Status:</strong> {{ report.status }}</p>
    <hr>
    <p>Digital Signature: SHA256-{{ report.origin | length }}{{ report.id }}9942</p>
    <a href="/dashboard" class="btn">Back to Dashboard</a>
</div>
{% endblock %}
