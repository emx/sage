<!DOCTYPE html>
<html>
<head>
    <title>VerdantPath Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #34495e; color: white; }
        .status { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <span>VerdantPath Logistics</span>
        <div>
            <a href="/">Home</a>
            <a href="/manifests">Manifests</a>
            <a href="/fleet">Fleet</a>
            <a href="/support">Support</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
