{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Vessel: {{ vessel.name }}</h2>
    <p><strong>Registry:</strong> {{ vessel.registry }}</p>
    <p><strong>Max Capacity:</strong> {{ vessel.capacity }}</p>
    <div style="margin-top: 2rem;">
        <a href="/telemetry/{{ vessel.id }}" style="padding: 10px 20px; background: #2980b9; color: white; text-decoration: none; border-radius: 4px;">View Real-time Telemetry</a>
    </div>
</div>
{% endblock %}
