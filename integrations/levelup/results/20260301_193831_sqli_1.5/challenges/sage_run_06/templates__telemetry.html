{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Reefer Telemetry Log</h2>
    <div id="controls" style="margin-bottom: 1rem;">
        <label>Sort By:</label>
        <select id="sortSelect" onchange="loadData()">
            <option value="timestamp">Time</option>
            <option value="temp_c">Temperature</option>
            <option value="humidity">Humidity</option>
        </select>
    </div>
    <table id="telemetryTable">
        <thead>
            <tr><th>Timestamp</th><th>Temp (C)</th><th>Humidity (%)</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<script>
function loadData() {
    const sort = document.getElementById('sortSelect').value;
    fetch(`/api/v1/telemetry/{{ vessel_id }}?sort=${sort}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#telemetryTable tbody');
            tbody.innerHTML = '';
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="3">${data.error}</td></tr>`;
                return;
            }
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.timestamp}</td><td>${row.temp_c}</td><td>${row.humidity}</td>`;
                tbody.appendChild(tr);
            });
        });
}
loadData();
</script>
{% endblock %}
