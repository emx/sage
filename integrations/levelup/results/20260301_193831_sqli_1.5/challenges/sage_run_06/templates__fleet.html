{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Active Fleet</h2>
    <table>
        <tr>
            <th>Vessel Name</th><th>Registry</th><th>Capacity</th><th>Action</th>
        </tr>
        {% for v in vessels %}
        <tr>
            <td>{{ v.name }}</td>
            <td>{{ v.registry }}</td>
            <td>{{ v.capacity }}</td>
            <td><a href="/fleet/{{ v.id }}">Details</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
