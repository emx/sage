{% block content %}

    <p><strong>Origin:</strong> {{ manifest.origin }}</p>

    <p>REEF-9901-A (Temperature Controlled)</p>
    <p>REEF-9901-B (Temperature Controlled)</p>
</div>
{% endblock %}
