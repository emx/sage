<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZenithStratus Aerospace</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #161b22; padding: 1rem; border-bottom: 2px solid #30363d; display: flex; justify-content: space-between; }
        nav a { color: #58a6ff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #30363d; }
        th { background: #21262d; }
        .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; }
        input, select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div>
            <span style="color: #f0f6fc; font-size: 1.2rem; margin-right: 20px;">ZENITH STRATUS</span>
            <a href="/">Home</a>
            {% if session.user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/telemetry">Telemetry</a>
            <a href="/maintenance">Maintenance</a>
            {% endif %}
        </div>
        <div>
            {% if session.user %}
            <span>Operator: {{ session.user }}</span>
            <a href="/logout" style="color: #f85149;">Logout</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
