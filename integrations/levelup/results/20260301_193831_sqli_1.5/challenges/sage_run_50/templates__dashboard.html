{% extends 'base.html' %}
{% block content %}
<h2>Active Constellation Status</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    {% for sat in satellites %}
    <div class="card">
        <h3>{{ sat.name }}</h3>
        <p><strong>Orbit:</strong> {{ sat.orbit }}</p>
        <p><strong>Status:</strong> <span style="color: #3fb950;">{{ sat.status }}</span></p>
        <a href="/satellite/{{ sat.id }}" class="btn">View Subsystems</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
