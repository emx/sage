{% extends 'base.html' %}
{% block content %}
<h2>Telemetry Data Query</h2>
<div class="card">
    <div style="display: flex; gap: 20px; align-items: flex-end;">
        <div>
            <label>Select Satellite</label><br>
            <select id="sat_id" style="width: 200px;">
                {% for sat in satellites %}
                <option value="{{ sat.id }}">{{ sat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Sort By</label><br>
            <select id="sort_field">
                <option value="timestamp">Timestamp (Newest First)</option>
                <option value="sensor_type">Sensor Type (A-Z)</option>
                <option value="value">Reading Value (Low-High)</option>
            </select>
        </div>
        <button onclick="runQuery()" class="btn">Execute Query</button>
    </div>
</div>

<div class="card" id="results_card" style="display: none;">
    <table id="results_table">
        <thead>
            <tr>
                <th>Sensor Type</th>
                <th>Reading</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="results_body"></tbody>
    </table>
</div>

<script>
async function runQuery() {
    const payload = {
        satellite_id: document.getElementById('sat_id').value,
        sort: document.getElementById('sort_field').value
    };

    const response = await fetch('/api/v1/telemetry/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const data = await response.json();
    const tbody = document.getElementById('results_body');
    tbody.innerHTML = '';

    if (data.error) {
        alert(data.error);
        return;
    }

    document.getElementById('results_card').style.display = 'block';
    data.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.sensor_type}</td><td>${row.value}</td><td>${row.timestamp}</td>`;
        tbody.appendChild(tr);
    });
}
</script>
{% endblock %}
