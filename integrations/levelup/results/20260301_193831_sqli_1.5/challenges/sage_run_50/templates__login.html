{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto;">
    <h2>Operator Authentication</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Technician ID</label><br>
            <input type="text" name="username" style="width: 95%;" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Access Token</label><br>
            <input type="password" name="password" style="width: 95%;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Authorize Access</button>
    </form>
</div>
{% endblock %}
