<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VerdantTrace Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #27ae60; color: white; }
        .btn { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VerdantTrace</strong> | Logistics Portal</div>
        <div>
            <a href="/">Home</a>
            <a href="/inventory">Silos</a>
            <a href="/shipments">Shipments</a>
            <a href="/tracking">Tracking</a>
            <a href="/about">About</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
