{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Shipment Search</h2>
    <form action="/shipments" method="GET">
        <input type="text" name="q" placeholder="Search destination..." style="padding: 10px; width: 300px;">
        <input type="submit" value="Search" class="btn">
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Driver</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.origin }}</td>
                <td>{{ row.destination }}</td>
                <td>{{ row.driver_name }}</td>
                <td>{{ row.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
