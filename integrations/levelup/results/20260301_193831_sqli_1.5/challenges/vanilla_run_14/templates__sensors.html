{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <h3>Sensor Network Telemetry</h3>
        <p>Use the interface below to query live readings. Advanced users can apply enrichment joins.</p>
    </div>
    <div class="col-md-12">
        <div class="card p-3">
            <div class="input-group mb-3">
                <span class="input-group-text">Enrichment Clause</span>
                <input type="text" id="enrichmentInput" class="form-control" placeholder="e.g. INNER JOIN regions ON regions.id = sensor_readings.region_id">
                <button class="btn btn-success" onclick="fetchTelemetry()">Run Query</button>
            </div>
            <div id="resultsArea">
                <p class="text-muted">Click 'Run Query' to load telemetry data...</p>
            </div>
        </div>
    </div>
</div>
<script>
async function fetchTelemetry() {
    const enrichment = document.getElementById('enrichmentInput').value;
    const resArea = document.getElementById('resultsArea');
    resArea.innerHTML = '<div class="spinner-border text-success"></div>';
    
    const response = await fetch('/api/v1/sensors/telemetry', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enrichment: enrichment})
    });
    
    const result = await response.json();
    if (result.status === 'success') {
        if (result.data.length === 0) {
            resArea.innerHTML = '<div class="alert alert-info">No data returned.</div>';
            return;
        }
        let html = '<table class="table table-sm"><thead><tr><th>ID</th><th>Sensor</th><th>Humidity</th><th>Temp</th></tr></thead><tbody>';
        result.data.forEach(r => {
            html += `<tr><td>${r.id}</td><td>${r.sensor_name}</td><td>${r.humidity}%</td><td>${r.temperature}°C</td></tr>`;
        });
        html += '</tbody></table>';
        resArea.innerHTML = html;
    } else {
        resArea.innerHTML = `<div class="alert alert-danger">${result.error || result.message}</div>`;
    }
}
</script>
{% endblock %}
