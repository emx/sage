{% extends 'base.html' %}
{% block content %}
<h1>Shipping Manifests</h1>
<div class="card">
    <input type="text" id="search" placeholder="Search by destination..." style="padding: 10px; width: 300px;">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Cargo</th>
                <th>Weight (kg)</th>
            </tr>
        </thead>
        <tbody id="manifest-data">
            {% for m in manifests %}
            <tr>
                <td>{{ m.manifest_id }}</td>
                <td>{{ m.origin }}</td>
                <td>{{ m.destination }}</td>
                <td>{{ m.cargo_type }}</td>
                <td>{{ m.weight }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
    document.getElementById('search').addEventListener('input', function(e) {
        fetch('/api/v1/search_manifests?q=' + e.target.value)
            .then(r => r.json())
            .then(data => {
                let html = '';
                data.forEach(m => {
                    html += `<tr><td>${m.manifest_id}</td><td>${m.origin}</td><td>${m.destination}</td><td>${m.cargo_type}</td><td>${m.weight}</td></tr>`;
                });
                document.getElementById('manifest-data').innerHTML = html;
            });
    });
</script>
{% endblock %}
