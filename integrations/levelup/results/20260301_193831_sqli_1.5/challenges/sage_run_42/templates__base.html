<!DOCTYPE html>
<html>
<head>
    <title>OrbitStream Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; }
        nav { background-color: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .alert { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>OrbitStream Logistics</strong></div>
        <div>
            <a href="/">Home</a>
            {% if session.user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/manifests">Manifests</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
