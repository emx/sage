{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Legacy Telemetry Report</h2>
    {% if error %}
        <p class="alert">Database Error: {{ error }}</p>
    {% endif %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Device ID</th>
                <th>Timestamp</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.device_id }}</td>
                <td>{{ row.timestamp }}</td>
                <td>{{ row.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
