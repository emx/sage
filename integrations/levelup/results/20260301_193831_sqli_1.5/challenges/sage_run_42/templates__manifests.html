{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Cargo Manifests</h2>
    <form method="GET">
        <input type="text" name="q" placeholder="Search Manifest ID or Destination..." style="padding: 8px; width: 300px;">
        <button type="submit" style="padding: 8px;">Search</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Cargo ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Weight (kg)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for m in manifests %}
            <tr>
                <td>{{ m.cargo_id }}</td>
                <td>{{ m.origin }}</td>
                <td>{{ m.destination }}</td>
                <td>{{ m.weight }}</td>
                <td>{{ m.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
