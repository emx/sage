{% extends "base.html" %}
{% block content %}
<h2>Cargo Manifests</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Cargo ID</th>
                <th>Destination</th>
                <th>Status</th>
                <th>Weight (kg)</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.cargo_id }}</td>
                <td>{{ item.destination }}</td>
                <td>{{ item.status }}</td>
                <td>{{ item.weight }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
