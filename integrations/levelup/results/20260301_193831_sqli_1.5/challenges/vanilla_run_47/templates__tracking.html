{% extends 'base.html' %}
{% block content %}
<h1>Shipment Tracking</h1>
<div class="card">
    <div style="margin-bottom: 20px;">
        <input type="text" id="tracking_id" placeholder="VA-XXXX">
        <button class="btn" onclick="track()">Track Shipment</button>
    </div>
    <div id="result"></div>
</div>
<script>
function track() {
    const id = document.getElementById('tracking_id').value;
    fetch('/api/v1/shipment/status', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({tracking_id: id})
    })
    .then(res => res.json())
    .then(data => {
        const resDiv = document.getElementById('result');
        if (data.error) {
            resDiv.innerHTML = '<p style="color: red;">Shipment not found.</p>';
        } else {
            resDiv.innerHTML = `<div class="card">
                <p><strong>Status:</strong> ${data.status}</p>
                <p><strong>Destination:</strong> ${data.destination}</p>
                <p><strong>Client:</strong> ${data.client_id}</p>
            </div>`;
        }
    });
}
</script>
{% endblock %}
