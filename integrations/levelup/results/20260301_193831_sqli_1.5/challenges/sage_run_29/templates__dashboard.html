{% extends 'base.html' %}
{% block content %}
<h2>Active Research Plots</h2>
<div class="row mt-4">
    {% for plot in plots %}
    <div class="col-md-4 mb-3">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">Plot #{{ plot.id }} - {{ plot.region }}</h5>
                <p class="card-text">Crop: {{ plot.crop_type }}<br>Status: {{ plot.status }}</p>
                <a href="/plot/{{ plot.id }}" class="btn btn-sm btn-outline-primary">View Chemistry Data</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
