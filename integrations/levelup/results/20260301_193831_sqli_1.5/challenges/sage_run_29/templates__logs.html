{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <h2>System Activity Logs</h2>
    <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Sort By</button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="?sort=timestamp">Time</a></li>
            <li><a class="dropdown-item" href="?sort=user">User</a></li>
            <li><a class="dropdown-item" href="?sort=event">Event</a></li>
        </ul>
    </div>
</div>
<div class="card mt-3">
    <table class="table">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>User</th>
                <th>Event</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.timestamp }}</td>
                <td>{{ log.user }}</td>
                <td>{{ log.event }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
