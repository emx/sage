{% extends "base.html" %}
{% block content %}
<h2>Managed Land Parcels</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
    {% for parcel in parcels %}
    <div class="card">
        <h3>{{ parcel.name }}</h3>
        <p>Location: {{ parcel.location }}</p>
        <p>Owner ID: {{ parcel.owner_id }}</p>
        <a href="/parcel/{{ parcel.id }}">View Soil Analysis</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
