{% extends "base.html" %}
{% block content %}
<h2>Technical Specifications: {{ part.part_name }}</h2>
<div class="card">
    <p><strong>SKU:</strong> {{ part.sku }}</p>
    <p><strong>Category:</strong> {{ part.category }}</p>
    <p><strong>Description:</strong> {{ part.description }}</p>
    <p><strong>Current Global Stock:</strong> {{ part.stock_level }}</p>
    <hr>
    <a href="/request-quote?part_id={{ part.id }}" class="btn btn-success">Request Quote</a>
</div>
{% endblock %}
