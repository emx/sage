{% extends 'base.html' %}
{% block content %}
<h2>Telemetry Analytics</h2>
<div class="card">
    <p>Telemetry feed for <strong>Vanguard-1</strong> is currently being migrated to the new v2 standard.</p>
    <p>Real-time data visualization is temporarily disabled.</p>
    <div id="data-container">
        <p><em>Waiting for legacy stream...</em></p>
    </div>
</div>

<script>
    /* 
       DEBUG: Legacy API endpoint still active for backward compatibility with 
       Ground-Node-Alpha. Access via /api/v1/archive?sort=timestamp
    */
    async function loadLegacyData() {
        try {
            const response = await fetch('/api/v1/archive?sort=timestamp');
            const data = await response.json();
            const container = document.getElementById('data-container');
            if (data.length > 0) {
                container.innerHTML = "<ul>" + data.slice(0, 3).map(i => `<li>${i.cargo_id} -> ${i.destination} (${i.timestamp})</li>`).join('') + "</ul>";
            }
        } catch (e) {}
    }
    window.onload = loadLegacyData;
</script>
{% endblock %}
