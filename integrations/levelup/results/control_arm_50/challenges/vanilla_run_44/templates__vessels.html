{% extends 'base.html' %}
{% block content %}
<h2>Vessel Registry</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    {% for v in vessels %}
    <div class="card">
        <h3 style="margin-top:0;">{{ v.vessel_name }}</h3>
        <p><strong>Registry ID:</strong> {{ v.vessel_id }}</p>
        <p><strong>Flag State:</strong> {{ v.flag_state }}</p>
        <p><strong>Current Port:</strong> {{ v.current_port }}</p>
        <button class="btn" onclick="alert('Loading metrics for {{ v.vessel_id }}...')">Inspect Metrics</button>
    </div>
    {% endfor %}
</div>
{% endblock %}
