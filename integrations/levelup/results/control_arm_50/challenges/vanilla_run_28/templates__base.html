<!DOCTYPE html>
<html>
<head>
    <title>VerdantPulse Systems</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2e7d32; padding: 1rem; color: white; display: flex; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .btn { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-secondary { background: #666; }
    </style>
</head>
<body>
    <nav>
        <a href="/">VerdantPulse</a>
        {% if session.user_id %}
            <a href="/dashboard">Dashboard</a>
            <a href="/about">About</a>
            <a href="/logout">Logout ({{ session.username }})</a>
        {% else %}
            <a href="/login">Login</a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
