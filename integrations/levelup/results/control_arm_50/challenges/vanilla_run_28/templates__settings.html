{% extends 'base.html' %}
{% block content %}
<h2>Field Configuration: {{ field.field_name }}</h2>
<div class="card">
    <form method="POST">
        <p><strong>Plot Name:</strong> {{ field.field_name }}</p>
        <p><strong>Crop Type:</strong> {{ field.crop_type }}</p>
        <label><strong>Report Sort Preference:</strong></label><br>
        <select name="sort_pref" style="padding: 8px; margin: 10px 0; width: 100%;">
            <option value="timestamp" {% if field.sort_pref == 'timestamp' %}selected{% endif %}>Timestamp (Default)</option>
            <option value="ph_level" {% if field.sort_pref == 'ph_level' %}selected{% endif %}>Soil pH</option>
            <option value="nitrogen" {% if field.sort_pref == 'nitrogen' %}selected{% endif %}>Nitrogen Levels</option>
        </select>
        <p><small>Note: Advanced users can provide custom column identifiers via the API.</small></p>
        <button type="submit" class="btn">Save Configuration</button>
    </form>
</div>
{% endblock %}
