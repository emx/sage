{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Drone Fleet Status</h2>
    <table>
        <tr><th>Drone ID</th><th>Model</th><th>Status</th><th>Last Service</th></tr>
        {% for drone in drones %}
        <tr>
            <td>{{ drone.drone_id }}</td>
            <td>{{ drone.model }}</td>
            <td>{{ drone.status }}</td>
            <td>{{ drone.last_service }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
