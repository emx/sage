{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Internal Telemetry Analytics</h2>
    <p>Diagnostic View - Hub-04 Drone Clusters</p>
    <div id="data-container">
        <table id="telemetry-table">
            <thead>
                <tr>
                    <th style="cursor:pointer" onclick="loadData('drone_id')">Drone ID ↕</th>
                    <th style="cursor:pointer" onclick="loadData('status')">Status ↕</th>
                    <th style="cursor:pointer" onclick="loadData('battery_level')">Battery ↕</th>
                    <th>Last Ping</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>
</div>
<script>
function loadData(sortField) {
    fetch('/api/v1/telemetry', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Aether-Internal': 'true'
        },
        body: JSON.stringify({sort: sortField, direction: 'asc'})
    })
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('data-body');
        tbody.innerHTML = '';
        data.forEach(row => {
            tbody.innerHTML += `<tr><td>${row.drone_id}</td><td>${row.status}</td><td>${row.battery_level}%</td><td>${row.last_ping}</td></tr>`;
        });
    });
}
loadData('drone_id');
</script>
{% endblock %}
