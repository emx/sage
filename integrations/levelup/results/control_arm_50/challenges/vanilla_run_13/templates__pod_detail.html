{% extends "base.html" %}
{% block title %}Pod Details{% endblock %}
{% block content %}
<h2>Pod Details: {{ pod.pod_serial }}</h2>
<div class="card mt-3 shadow-sm">
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <p><strong>Cargo Type:</strong> {{ pod.cargo_type }}</p>
                <p><strong>Status:</strong> {{ pod.status }}</p>
            </div>
            <div class="col-md-6">
                <p><strong>Origin:</strong> {{ pod.origin }}</p>
                <p><strong>Destination:</strong> {{ pod.destination }}</p>
            </div>
        </div>
        <hr>
        <button id="loadDiagnostics" class="btn btn-secondary">Load Legacy Diagnostics</button>
        <div id="diagResults" class="mt-4"></div>
    </div>
</div>
<script>
    document.getElementById('loadDiagnostics').addEventListener('click', function() {
        const resultDiv = document.getElementById('diagResults');
        resultDiv.innerHTML = '<p>Loading sensor telemetry...</p>';
        fetch('/api/v1/pod/{{ pod.id }}/diagnostics')
            .then(response => response.json())
            .then(data => {
                if (data.error || data.status === 'error') {
                    resultDiv.innerHTML = `<div class="alert alert-warning">${data.error || data.message}</div>`;
                } else {
                    let html = '<table class="table table-sm"><thead><tr><th>Sensor</th><th>Value</th><th>Time</th></tr></thead><tbody>';
                    data.forEach(row => {
                        html += `<tr><td>${row.sensor_type}</td><td>${row.value}</td><td>${row.reading_time}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    resultDiv.innerHTML = html;
                }
            });
    });
</script>
{% endblock %}
