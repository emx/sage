{% extends 'base.html' %}
{% block content %}
<h2>Manifest Details: {{ manifest.id }}</h2>
<div class="card">
    <p><strong>Client:</strong> {{ manifest.client }}</p>
    <p><strong>Current Status:</strong> {{ manifest.status }}</p>
    <p><strong>Last Scan:</strong> {{ manifest.last_update }}</p>
    <p><strong>Priority:</strong> High</p>
    <br>
    <a href="/dashboard" class="btn">Back to Dashboard</a>
</div>
{% endblock %}
