<!DOCTYPE html>
<html>
<head>
    <title>VortexSentry Global</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; }
        nav { background-color: #2c3e50; padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3498db; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background-color: #2d2d2d; padding: 20px; border-radius: 8px; border: 1px solid #444; margin-bottom: 20px; }
        h1, h2 { color: #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background-color: #34495e; }
        .btn { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background-color: #2980b9; }
        .alert { color: #e74c3c; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">VortexSentry Global</a>
            {% if session.user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/inventory">Inventory</a>
            <a href="/reports">Reports</a>
            {% endif %}
        </div>
        <div>
            {% if session.user %}
            <span>Welcome, {{ session.user }}</span>
            <a href="/logout" style="margin-left: 20px;">Logout</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
