{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Personnel Login</h2>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 90%; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #1a1a1a; color: white;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 90%; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #1a1a1a; color: white;">
        </div>
        <button type="submit" class="btn">Authorize</button>
    </form>
</div>
{% endblock %}
