{% extends 'base.html' %}
{% block content %}
<h2>Warehouse Inventory</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Asset ID</th>
                <th>Item Name</th>
                <th>Classification</th>
                <th>Location</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.item_name }}</td>
                <td>{{ item.item_type }}</td>
                <td>{{ item.location }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
