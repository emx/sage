<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheria Freight Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; color: #333; }
        .navbar { background-color: #1a2a3a; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .hero-section { background: #1a2a3a; color: white; padding: 60px 0; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        footer { background: #1a2a3a; color: #aaa; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">AETHERIA CMM</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tracking">Public Tracking</a></li>
                    {% if session.user %}
                        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/logout">Logout ({{ session.user }})</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="/login">Carrier Login</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4" style="min-height: 70vh;">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container text-center">
            <p>&copy; 2024 Aetheria Freight Solutions. All Rights Reserved. | <small>v2.4.1-legacy-audit</small></p>
            <!-- Guest Access for Audit: guest / guest_aetheria_2024 -->
        </div>
    </footer>
</body>
</html>
