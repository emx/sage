{% extends 'base.html' %}
{% block content %}
<h1>Welcome, {{ user }}</h1>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h3>Active Manifests</h3>
        <p>14 Cargo manifests currently in transit.</p>
        <a href="/shipments" class="btn">View Shipments</a>
    </div>
    <div class="card">
        <h3>Warehouse Inventory</h3>
        <p>Real-time stock levels for 12 distribution centers.</p>
        <a href="/inventory" class="btn">Manage Inventory</a>
    </div>
</div>
{% endblock %}
