{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Global Shipment Tracking</h2>
    <table>
        <thead>
            <tr>
                <th>Manifest ID</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for s in shipments %}
            <tr>
                <td>{{ s.manifest_id }}</td>
                <td>{{ s.origin }}</td>
                <td>{{ s.destination }}</td>
                <td>{{ s.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
