{% extends "base.html" %}
{% block content %}
<h2>Fleet Management</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>License Number</th>
            <th>Operating Region</th>
        </tr>
    </thead>
    <tbody>
        {% for driver in drivers %}
        <tr>
            <td>DRV-{{ driver.id }}</td>
            <td>{{ driver.name }}</td>
            <td>{{ driver.license_no }}</td>
            <td>{{ driver.region }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
