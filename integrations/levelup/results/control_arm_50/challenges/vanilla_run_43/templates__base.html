<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>VAL - Aerospace Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #1a2a6c; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #ddd; }
        .btn { background: #b21f1f; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #8e1919; }
        input[type='text'], input[type='password'] { padding: 0.5rem; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div style='font-weight: bold; font-size: 1.2rem;'>Vanguard Aethelgard Logistics</div>
        <div>
            <a href='/'>Home</a>
            {% if session.get('user') %}
                <a href='/dashboard'>Dashboard</a>
                <a href='/inventory'>Inventory</a>
            {% else %}
                <a href='/login'>Staff Login</a>
            {% endif %}
        </div>
    </nav>
    <div class='container'>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
