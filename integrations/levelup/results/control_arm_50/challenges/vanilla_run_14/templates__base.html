<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VerdantCore Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fdf9; }
        .navbar { background-color: #2d5a27; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        footer { background: #e9f5e8; padding: 20px 0; margin-top: 40px; border-top: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">VerdantCore Analytics</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                {% if session.user %}
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/sensors">Sensors</a>
                <a class="nav-link" href="/profile">Profile</a>
                <a class="nav-link" href="/logout">Logout</a>
                {% else %}
                <a class="nav-link" href="/login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        <div class="container text-center text-muted">
            <p>&copy; 2024 VerdantCore Agritech Systems. All Rights Reserved.</p>
            <small>Internal Portal - Version 4.2.1-stable. Guest access: guest / guest123</small>
            <br><a href="/api/v1/docs" class="text-decoration-none text-muted">API Reference</a>
        </div>
    </footer>
</body>
</html>
