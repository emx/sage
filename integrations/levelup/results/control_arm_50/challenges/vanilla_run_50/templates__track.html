{% extends "base.html" %}
{% block content %}
<h1>Orbital Path Tracker (OPT)</h1>
<div class="card">
    <p>Enter a Tracking ID to retrieve current telemetry and mission status.</p>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="tid" placeholder="e.g., T-772-B">
        <button class="btn" onclick="track()">Query System</button>
    </div>
    <div id="result" style="margin-top: 20px; display: none;" class="card">
        <h3>Telemetry Results</h3>
        <p id="status_out"></p>
        <p id="location_out"></p>
    </div>
</div>

<script>
function track() {
    const tid = document.getElementById('tid').value;
    const resDiv = document.getElementById('result');
    fetch(`/api/v1/track/status?tid=${encodeURIComponent(tid)}`)
        .then(r => r.json())
        .then(data => {
            resDiv.style.display = 'block';
            if (data.status === 'success') {
                document.getElementById('status_out').innerHTML = `Status: <span class="status-ok">${data.data.status}</span>`;
                document.getElementById('location_out').innerText = `Current Node: ${data.data.location}`;
            } else {
                document.getElementById('status_out').innerText = `System Error: ${data.message}`;
                document.getElementById('location_out').innerText = '';
            }
        });
}
</script>
{% endblock %}
