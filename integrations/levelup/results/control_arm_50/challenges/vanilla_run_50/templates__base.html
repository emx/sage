<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetheris Logistics | Orbital Solutions</title>
    <style>
        body { background: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #2d3436; display: flex; gap: 20px; }
        nav a { color: #00d2ff; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #fff; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: #1a1f29; padding: 1.5rem; border-radius: 8px; border: 1px solid #34495e; margin-bottom: 1rem; }
        h1, h2 { color: #00d2ff; }
        .btn { background: #00d2ff; color: #0b0e14; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .status-ok { color: #55efc4; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #2d3436; }
        input { background: #0b0e14; border: 1px solid #34495e; color: white; padding: 0.5rem; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/manifests">Cargo Manifests</a>
        <a href="/track">Track Payload</a>
        <a href="/contractors">Contractors</a>
        <a href="/login">Employee Portal</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
