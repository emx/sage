{% extends "base.html" %}
{% block content %}
<h2>Hardware Node Fleet</h2>
<div class="table-responsive mt-4">
    <table class="table table-dark table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Node Name</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for node in nodes %}
            <tr>
                <td>{{ node.id }}</td>
                <td>{{ node.node_name }}</td>
                <td>
                    <span class="badge {% if node.status == 'active' %}bg-success{% else %}bg-warning{% endif %}">
                        {{ node.status }}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-outline-info" onclick="runDiagnostic({{ node.id }})">Run Diagnostic</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="diag-result" class="mt-4 p-3 border border-secondary rounded d-none">
    <h5>Diagnostic Result for Node #<span id="node-id-display"></span></h5>
    <pre id="json-output" class="text-info"></pre>
</div>

<script>
function runDiagnostic(id) {
    const output = document.getElementById('diag-result');
    const pre = document.getElementById('json-output');
    const display = document.getElementById('node-id-display');
    
    output.classList.remove('d-none');
    display.innerText = id;
    pre.innerText = "Querying telemetry engine...";

    fetch(`/api/v1/nodes/diagnostic?node_id=${id}`)
        .then(response => response.json())
        .then(data => {
            pre.innerText = JSON.stringify(data, null, 2);
        })
        .catch(err => {
            pre.innerText = "Error communicating with API";
        });
}

// TODO: Security Audit - Ensure the /api/v1/nodes/diagnostic endpoint
// is not vulnerable to blind inference of system_vault data.
</script>
{% endblock %}
