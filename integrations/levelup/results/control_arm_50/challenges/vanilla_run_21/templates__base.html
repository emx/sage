<!DOCTYPE html>
<html>
<head>
    <title>VerdantPulse Central</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #2d5a27; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-links a { color: white; text-decoration: none; margin-left: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; border-bottom: 1px solid #ddd; text-align: left; }
        .btn { background: #2d5a27; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VerdantPulse</strong> Solutions</div>
        <div class="nav-links">
            <a href="/">Home</a>
            {% if session.user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/inventory">Inventory</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
