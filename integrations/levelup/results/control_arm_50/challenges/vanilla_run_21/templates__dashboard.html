{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>System Status: Operational</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div style="background: #e8f5e9; padding: 1rem; border-radius: 4px;">
            <h3>Node Density</h3>
            <p>142 active sensors across 4 sectors.</p>
        </div>
        <div style="background: #e8f5e9; padding: 1rem; border-radius: 4px;">
            <h3>Supply Level</h3>
            <p>Chemical reserves at 84% capacity.</p>
        </div>
    </div>
</div>
{% endblock %}
