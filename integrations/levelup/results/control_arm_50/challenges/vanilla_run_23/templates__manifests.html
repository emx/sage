{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Cargo Manifests</h2>
    <p>Staff only: Accessing manifest verification systems...</p>
    <table>
        <tr><th>Manifest ID</th><th>Vessel</th><th>Cargo Type</th></tr>
        {% for m in manifests %}
        <tr>
            <td>{{ m.manifest_id }}</td>
            <td>{{ m.vessel_id }}</td>
            <td>{{ m.cargo_type }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
<!-- TODO: Integrate legacy verification API at /api/v1/manifest/verify -->
<!-- Requires JSON: {"id": "MANIFEST_ID"} -->
{% endblock %}
