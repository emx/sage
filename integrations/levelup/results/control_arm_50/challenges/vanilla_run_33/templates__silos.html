{% extends 'base.html' %}
{% block content %}
<h1>Grain Inventory</h1>
<div class="card">
    <table>
        <thead>
            <tr><th>Silo Name</th><th>Grain Type</th><th>Current Capacity (%)</th></tr>
        </thead>
        <tbody>
            {% for s in silos %}
            <tr>
                <td>{{ s.silo_name }}</td>
                <td>{{ s.grain_type }}</td>
                <td>{{ s.capacity }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
