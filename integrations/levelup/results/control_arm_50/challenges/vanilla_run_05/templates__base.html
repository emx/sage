<!DOCTYPE html>
<html>
<head>
    <title>AstraVanguard Logistics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; }
        nav { background: #1a237e; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 15px; }
        .container { padding: 2rem; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .btn { background: #1a237e; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        input { padding: 0.5rem; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>AstraVanguard Logistics</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/parts">Inventory</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/login">Login</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
