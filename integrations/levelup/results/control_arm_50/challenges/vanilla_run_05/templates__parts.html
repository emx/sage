{% extends 'base.html' %}
{% block content %}
<h2>Global Inventory</h2>
<table style="width:100%; border-collapse: collapse;">
    <tr style="background: #ddd; text-align: left;">
        <th>ID</th><th>Part Name</th><th>Serial Number</th><th>Status</th>
    </tr>
    {% for part in parts %}
    <tr style="border-bottom: 1px solid #eee;">
        <td>{{ part.id }}</td><td>{{ part.name }}</td><td>{{ part.serial_number }}</td><td>{{ part.status }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
