{% extends 'base.html' %}
{% block content %}
<h1>Telemetry Maintenance Portal</h1>
<p>Enter a Sensor Part Number to verify its live telemetry status from the orbital network.</p>
<div class="card">
    <input type="text" id="sensor_id" placeholder="SENS-001" style="padding: 8px; border-radius: 4px; border: 1px solid #30363d; background: #0d1117; color: white;">
    <button onclick="checkStatus()" style="padding: 8px 16px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer;">Check Status</button>
    <div id="result" style="margin-top: 20px;"></div>
</div>

<script>
function checkStatus() {
    const id = document.getElementById('sensor_id').value;
    const resDiv = document.getElementById('result');
    resDiv.innerHTML = 'Querying orbital relay...';
    
    fetch(`/api/v1/telemetry/status?sensor_id=${encodeURIComponent(id)}`)
        .then(r => r.json())
        .then(data => {
            if(data.status === 'Active') {
                resDiv.innerHTML = `<span class="status-active">STATUS: ${data.status}</span><br>Telemetry: ${data.telemetry}`;
            } else if(data.status === 'Offline') {
                resDiv.innerHTML = `<span class="status-offline">STATUS: ${data.status}</span><br>Telemetry: ${data.telemetry}`;
            } else {
                resDiv.innerHTML = `<span style="color:orange">${data.message}</span>`;
            }
        });
}
</script>
{% endblock %}
