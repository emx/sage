{% extends 'base.html' %}
{% block content %}
<h1>Flight-Certified Hardware</h1>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Part Number</th>
                <th>Name</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for part in parts %}
            <tr>
                <td><code>{{ part.part_number }}</code></td>
                <td>{{ part.name }}</td>
                <td>{{ part.category }}</td>
                <td><a href="/component/{{ part.id }}">View Details</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
