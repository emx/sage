{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Personnel Login</h2>
    {% if error %}<p class="alert">{{ error }}</p>{% endif %}
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <button type="submit" class="btn" style="width: 104%;">Authorize</button>
    </form>
    <p style="font-size: 0.8em; margin-top: 20px; color: #888;">Testing access: guest / guest123</p>
</div>
{% endblock %}
