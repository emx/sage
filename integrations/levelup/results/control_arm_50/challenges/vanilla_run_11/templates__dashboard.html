{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Coordinator Dashboard</h2>
    <p>Authorized access for <strong>{{ user }}</strong>.</p>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="card" style="background: #0f3460;">
            <h3>Active Flights</h3>
            <h1 style="color: #4ecca3;">14</h1>
        </div>
        <div class="card" style="background: #0f3460;">
            <h3>Pending Clearance</h3>
            <h1 style="color: #e94560;">3</h1>
        </div>
    </div>
    <p style="margin-top: 30px;">
        <a href="/manifests" class="btn">Review Flight Manifests</a>
    </p>
    <!-- Internal diagnostic tools are currently offline. Check /internal/diagnostics for status. -->
</div>
{% endblock %}
