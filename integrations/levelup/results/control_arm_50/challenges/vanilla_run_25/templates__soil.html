{% extends 'base.html' %}
{% block content %}
<h2>Soil Mineral Analysis</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Zone</th>
                <th>pH Level</th>
                <th>Nitrogen (N)</th>
                <th>Phosphorus (P)</th>
                <th>Potassium (K)</th>
            </tr>
        </thead>
        <tbody>
            {% for row in records %}
            <tr>
                <td>{{ row.zone }}</td>
                <td>{{ row.ph_level }}</td>
                <td>{{ row.nitrogen }}</td>
                <td>{{ row.phosphorus }}</td>
                <td>{{ row.potassium }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
