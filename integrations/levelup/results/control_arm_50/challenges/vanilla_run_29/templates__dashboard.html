{% extends 'base.html' %}
{% block content %}
<h2>System Dashboard</h2>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h3>Active Sensors</h3>
        <p style="font-size: 2rem; color: #27ae60;">1,204</p>
    </div>
    <div class="card">
        <h3>System Health</h3>
        <p style="font-size: 2rem; color: #2980b9;">99.8%</p>
    </div>
</div>
<div class="card">
    <h3>Node Notifications</h3>
    <ul>
        <li>Node-44: Calibration required</li>
        <li>Node-89: Nutrient level low</li>
        <li>Node-12: Update successful</li>
    </ul>
</div>

</script>
{% endblock %}
