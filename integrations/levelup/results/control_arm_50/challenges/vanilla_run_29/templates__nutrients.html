{% extends 'base.html' %}
{% block content %}
<h2>Nutrient Distribution Profiles</h2>
<div class="card">
    <table>
        <tr>
            <th>Profile Name</th>
            <th>Nitrogen %</th>
            <th>Phosphorus %</th>
            <th>Potassium %</th>
        </tr>
        {% for profile in profiles %}
        <tr>
            <td>{{ profile.profile_name }}</td>
            <td>{{ profile.nitrogen }}</td>
            <td>{{ profile.phosphorus }}</td>
            <td>{{ profile.potassium }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
