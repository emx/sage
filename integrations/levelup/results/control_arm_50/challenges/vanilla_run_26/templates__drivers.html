{% extends "base.html" %}
{% block content %}
<h2>Driver Fleet Metrics</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Route Grade</th>
                <th>Compliance Score</th>
            </tr>
        </thead>
        <tbody>
            {% for driver in drivers %}
            <tr>
                <td>{{ driver.emp_id }}</td>
                <td>{{ driver.name }}</td>
                <td>{{ driver.grade }}</td>
                <td>{{ driver.compliance }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
