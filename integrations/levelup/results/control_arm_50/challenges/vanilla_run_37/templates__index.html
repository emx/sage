{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto; text-align: center;">
    <h2>Portal Login</h2>
    <form action="/login" method="post">
        <div style="margin: 15px 0;">
            <input type="text" name="username" placeholder="Username" required style="width: 100%;">
        </div>
        <div style="margin: 15px 0;">
            <input type="password" name="password" placeholder="Password" required style="width: 100%;">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Access System</button>
    </form>
    <p style="font-size: 0.8em; color: #78909c; margin-top: 20px;">Guest access: guest / vanguard2024</p>
</div>
{% endblock %}
