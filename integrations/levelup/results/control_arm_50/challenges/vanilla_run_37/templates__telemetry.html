{% extends "base.html" %}
{% block content %}
<h2>Drone Telemetry Monitoring</h2>
<div class="card">
    <h3>Active Units</h3>
    <div id="drone-list">
        {% for drone in drones %}
        <div style="padding: 10px; border: 1px solid #2a4d69; margin: 5px 0; border-radius: 4px;">
            <strong>{{ drone.drone_name }}</strong> - Depth: {{ drone.depth }}m - Battery: {{ drone.battery }}%
            <button onclick="loadTelemetry({{ drone.id }})" class="btn" style="float: right; padding: 5px 10px; font-size: 0.8em;">View Logs</button>
        </div>
        {% endfor %}
    </div>
</div>

<div id="telemetry-results" class="card" style="margin-top: 20px; display: none;">
    <h3>Telemetry Feed: <span id="current-drone"></span></h3>
    <table>
        <thead>
            <tr>
                <th style="cursor:pointer" onclick="sortTelemetry('timestamp')">Timestamp</th>
                <th style="cursor:pointer" onclick="sortTelemetry('message')">Message</th>
            </tr>
        </thead>
        <tbody id="log-body"></tbody>
    </table>
</div>

<script>
let currentDroneId = 1;
function loadTelemetry(id) {
    currentDroneId = id;
    sortTelemetry('timestamp');
}

function sortTelemetry(field) {
    fetch(`/api/v1/telemetry/search?drone_id=${currentDroneId}&sort=${field}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                alert("Error: " + data.error);
                return;
            }
            document.getElementById('telemetry-results').style.display = 'block';
            document.getElementById('current-drone').innerText = "Drone #" + currentDroneId;
            const body = document.getElementById('log-body');
            body.innerHTML = '';
            data.forEach(log => {
                body.innerHTML += `<tr><td>${log.timestamp}</td><td>${log.message}</td></tr>`;
            });
        });
}
</script>
{% endblock %}
