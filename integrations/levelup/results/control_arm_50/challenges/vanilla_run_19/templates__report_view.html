{% extends 'base.html' %}
{% block content %}
<h2>Report: {{ report_name }}</h2>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Tracking #</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Cargo Type</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for s in shipments %}
            <tr>
                <td><code>{{ s.tracking_no }}</code></td>
                <td>{{ s.origin }}</td>
                <td>{{ s.destination }}</td>
                <td>{{ s.cargo_type }}</td>
                <td>{{ s.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="{{ url_for('reports') }}" class="btn">Back to Reports</a>
</div>
{% endblock %}
