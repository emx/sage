<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vesper & Gilt International</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #0a0a0a; color: #d4af37; margin: 0; }
        nav { background: #1a1a1a; padding: 20px; border-bottom: 1px solid #d4af37; display: flex; justify-content: space-between; }
        nav a { color: #d4af37; text-decoration: none; margin: 0 15px; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: #1a1a1a; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        button { background: #d4af37; color: #0a0a0a; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        input { background: #222; border: 1px solid #d4af37; color: #fff; padding: 8px; }
    </style>
</head>
<body>
    <nav>
        <div><strong>VESPER & GILT</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/estates">Portfolio</a>
            {% if session.user_id %}
                <a href="/dashboard">Concierge</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Member Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
