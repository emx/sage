{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Global Tracking</h1>
    <form style="margin-top: 1rem;">
        <input type="text" placeholder="Enter Container ID or BOL..." style="padding: 10px; width: 300px; border-radius: 4px; border: 1px solid #ccc;">
        <button type="button" style="padding: 10px 20px; background: #1a2a6c; color: white; border: none; border-radius: 4px; cursor: pointer;">Track</button>
    </form>
    <p style="margin-top: 2rem; color: #666; font-style: italic;">Use the internal API /api/v1/shipments for automated tracking integrations.</p>
</div>
{% endblock %}
