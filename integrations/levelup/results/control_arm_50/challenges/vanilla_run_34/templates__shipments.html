{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Active Shipments</h1>
    <table>
        <thead>
            <tr>
                <th><a href="/shipments?sort=id" style="color:inherit;text-decoration:none">ID</a></th>
                <th><a href="/shipments?sort=container_id" style="color:inherit;text-decoration:none">Container ID</a></th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for s in shipments %}
            <tr>
                <td>{{ s.id }}</td>
                <td><a href="/shipment/{{ s.id }}">{{ s.container_id }}</a></td>
                <td>{{ s.origin }}</td>
                <td>{{ s.destination }}</td>
                <td><span class="status-badge">{{ s.status }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
