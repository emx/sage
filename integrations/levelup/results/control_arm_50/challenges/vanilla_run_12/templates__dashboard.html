{% extends "base.html" %}
{% block content %}
<h2>Agronomist Dashboard</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
    {% for plot in plots %}
    <div class="card">
        <h3>Plot #{{ plot.id }}: {{ plot.name }}</h3>
        <p><strong>Location:</strong> {{ plot.coordinates }}</p>
        <p><strong>Soil Type:</strong> {{ plot.soil_type }}</p>
        <a href="/plot/{{ plot.id }}" class="btn btn-alt">View Sensor Data</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
