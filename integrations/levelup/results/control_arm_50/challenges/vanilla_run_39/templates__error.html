{% extends "base.html" %}
{% block content %}
<h1 style="color: #c0392b;">System Error</h1>
<div class="card" style="border-left: 5px solid #c0392b;">
    <p>{{ message }}</p>
    {% if debug %}
    <pre style="background: #fdfdfd; padding: 10px;">{{ debug }}</pre>
    {% endif %}
</div>
<a href="/">Return to Safety</a>
{% endblock %}
