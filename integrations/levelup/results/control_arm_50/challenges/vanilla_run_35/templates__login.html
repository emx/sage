{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Partner Login</h2>
    <form onsubmit="return false;">
        <div style="margin-bottom: 1rem;">
            <label>Partner ID</label><br>
            <input type="text" style="width: 100%; padding: 0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Access Key</label><br>
            <input type="password" style="width: 100%; padding: 0.5rem;">
        </div>
        <button class="btn" style="width: 100%;">Authorize</button>
    </form>
    <p style="font-size: 0.8rem; color: #666; margin-top: 1rem;">Note: Access is restricted to authorized IP addresses. Your attempt will be logged.</p>
</div>
{% endblock %}
