<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - VerdantAxle</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        nav { background-color: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav a { color: #ecf0f1; text-decoration: none; margin: 0 10px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        h1, h2 { color: #27ae60; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        .btn { background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background-color: #219150; }
        footer { text-align: center; padding: 2rem; color: #7f8c8d; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <div>VerdantAxle Command</div>
        <div>
            <a href="/">Home</a>
            <a href="/tracking">Shipments</a>
            <a href="/inventory">Inventory</a>
            <a href="/support">Support</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2024 VerdantAxle Dynamics. Internal Use Only.
    </footer>
</body>
</html>
