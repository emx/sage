{% extends "base.html" %}
{% block content %}
<h2>Warehouse Inventory Status</h2>
<table>
    <thead>
        <tr>
            <th>SKU</th>
            <th>Product Name</th>
            <th>Quantity</th>
            <th>Warehouse Location</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.sku }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.location }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
