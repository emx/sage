<!DOCTYPE html>
<html>
<head>
    <title>Vanguard Aetheria - Telemetry</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; margin: 0; }
        nav { background: #1a1f29; padding: 1rem; border-bottom: 2px solid #2a313d; display: flex; justify-content: space-between; }
        nav a { color: #00a8ff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: #1a1f29; border: 1px solid #2a313d; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        h1, h2 { color: #00a8ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #2a313d; }
        th { background: #2a313d; }
        .status-active { color: #4cd137; }
        .status-maintenance { color: #fbc531; }
        .footer { text-align: center; font-size: 0.8rem; color: #7f8c8d; margin-top: 3rem; }
    </style>
</head>
<body>
    <nav>
        <div><strong>Vanguard Aetheria</strong></div>
        <div>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/satellites">Satellites</a>
            <a href="/docs">API Docs</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">&copy; 2024 Vanguard Aetheria Aerospace Division</div>
</body>
</html>
