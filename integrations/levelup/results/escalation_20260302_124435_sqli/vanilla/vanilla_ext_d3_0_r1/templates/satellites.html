{% extends 'base.html' %}
{% block content %}
<h2>Satellite Constellation</h2>
<div class="card">
    <table>
        <thead>
            <tr><th>Name</th><th>Orbit</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for sat in satellites %}
            <tr>
                <td>{{ sat['name'] }}</td>
                <td>{{ sat['orbit'] }}</td>
                <td class="status-{{ sat['status']|lower }}">{{ sat['status'] }}</td>
                <td><a href="/telemetry/{{ sat['id'] }}" style="color: #00a8ff;">View Telemetry</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
