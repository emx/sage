{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h3>Manifest Log #{{ log.id }}</h3>
        <p><strong>Handler:</strong> {{ log.handler_name }}</p>
        <p><strong>Note:</strong> {{ log.notes }}</p>
        <hr>
        <p class="text-muted small">License: AETHERIS-LIC-9921-X | Node Signature: sha256(license+salt+nonce)</p>
    </div>
</div>
{% endblock %}
