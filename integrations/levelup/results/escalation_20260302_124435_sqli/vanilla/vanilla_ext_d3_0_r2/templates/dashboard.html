{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Propulsion Units</h2>
    <span class="badge {% if mode == 'DIAGNOSTIC' %}bg-danger{% else %}bg-primary{% endif %}">Mode: {{ mode }}</span>
</div>
<div class="row">
    <table class="table table-dark table-striped">
        <thead>
            <tr><th>ID</th><th>Part Name</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for c in components %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.part_name }}</td>
                <td><span class="badge bg-success">{{ c.status }}</span></td>
            </tr>
            {% endfor %}<tbody>
    </table>
</div>
<script src="/static/js/dashboard.js"></script>
{% endblock %}
