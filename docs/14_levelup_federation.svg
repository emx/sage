<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" rx="12" fill="#F0F6FF"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="60" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="30" width="1100" height="30" fill="url(#headerGrad)"/>
  <text x="550" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Figure 4: Level Up as Proof of Concept --- Federation in Practice</text>

  <!-- TODAY column -->
  <rect x="30" y="80" width="500" height="590" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" opacity="0.3"/>
  <text x="280" y="108" text-anchor="middle" fill="#DC2626" font-size="18" font-weight="bold">Today: Manual Knowledge</text>

  <!-- Agent boxes without memory -->
  <rect x="60" y="130" width="200" height="100" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="155" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Designer Agent</text>
  <text x="160" y="175" text-anchor="middle" fill="#DC2626" font-size="10">Hard-coded rules:</text>
  <text x="160" y="190" text-anchor="middle" fill="#6B7280" font-size="9">"Always isolate flag files"</text>
  <text x="160" y="205" text-anchor="middle" fill="#6B7280" font-size="9">"Use port 5000 for Flask"</text>
  <text x="160" y="220" text-anchor="middle" fill="#DC2626" font-size="9">Can't learn new patterns</text>

  <rect x="300" y="130" width="200" height="100" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="155" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Exploit Agent</text>
  <text x="400" y="175" text-anchor="middle" fill="#DC2626" font-size="10">Hard-coded strategies:</text>
  <text x="400" y="190" text-anchor="middle" fill="#6B7280" font-size="9">"Try UNION for SQLi"</text>
  <text x="400" y="205" text-anchor="middle" fill="#6B7280" font-size="9">"Use 5 retry attempts"</text>
  <text x="400" y="220" text-anchor="middle" fill="#DC2626" font-size="9">Repeats failed attacks</text>

  <rect x="60" y="250" width="200" height="100" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="275" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Calibrator Agent</text>
  <text x="160" y="295" text-anchor="middle" fill="#DC2626" font-size="10">Fixed formula:</text>
  <text x="160" y="310" text-anchor="middle" fill="#6B7280" font-size="9">"0.6 * target + 0.4 * raw"</text>
  <text x="160" y="325" text-anchor="middle" fill="#6B7280" font-size="9">No historical context</text>
  <text x="160" y="340" text-anchor="middle" fill="#DC2626" font-size="9">Same bias every time</text>

  <rect x="300" y="250" width="200" height="100" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="275" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Evolution Worker</text>
  <text x="400" y="295" text-anchor="middle" fill="#DC2626" font-size="10">No cross-loop memory:</text>
  <text x="400" y="310" text-anchor="middle" fill="#6B7280" font-size="9">Loop C can't explain to</text>
  <text x="400" y="325" text-anchor="middle" fill="#6B7280" font-size="9">Loop A why templates fail</text>
  <text x="400" y="340" text-anchor="middle" fill="#DC2626" font-size="9">Siloed decisions</text>

  <!-- Problems summary -->
  <rect x="60" y="375" width="440" height="120" rx="10" fill="white" stroke="#DC2626" stroke-width="1.5"/>
  <text x="280" y="400" text-anchor="middle" fill="#DC2626" font-size="13" font-weight="bold">What Gets Lost</text>
  <text x="80" y="420" fill="#6B7280" font-size="10">- Designer discovers /debug leaks flags, but Validator doesn't know</text>
  <text x="80" y="438" fill="#6B7280" font-size="10">- Exploit finds CSP bypass, but next exploit session forgets it</text>
  <text x="80" y="456" fill="#6B7280" font-size="10">- Calibrator consistently underestimates RSA --- no self-correction</text>
  <text x="80" y="474" fill="#6B7280" font-size="10">- Web patterns that transfer to API security --- never shared</text>

  <!-- Arrow -->
  <text x="547" y="355" text-anchor="middle" fill="#059669" font-size="48" font-weight="bold">&gt;</text>

  <!-- FUTURE column -->
  <rect x="570" y="80" width="500" height="590" rx="12" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" opacity="0.3"/>
  <text x="820" y="108" text-anchor="middle" fill="#059669" font-size="18" font-weight="bold">With Federation Memory</text>

  <!-- Federation chain at top -->
  <rect x="600" y="125" width="440" height="45" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="820" y="147" text-anchor="middle" fill="#059669" font-size="12" font-weight="bold">Level Up Federation Chain --- 23,891 validated memories</text>
  <text x="820" y="162" text-anchor="middle" fill="#047857" font-size="10">Goals | Principles | Patterns | Failures | Cross-Type Insights</text>

  <!-- Arrows down -->
  <line x1="700" y1="170" x2="700" y2="195" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="820" y1="170" x2="820" y2="195" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="940" y1="170" x2="940" y2="195" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Three departments -->
  <!-- Dept 1: Generation -->
  <rect x="600" y="200" width="180" height="55" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="2"/>
  <text x="690" y="220" text-anchor="middle" fill="#0891B2" font-size="11" font-weight="bold">Challenge Generation</text>
  <text x="690" y="237" text-anchor="middle" fill="#6B7280" font-size="9">847 relevant memories</text>
  <text x="690" y="250" text-anchor="middle" fill="#6B7280" font-size="9">distilled for context</text>

  <!-- Dept 2: Intelligence -->
  <rect x="730" y="200" width="180" height="55" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="820" y="220" text-anchor="middle" fill="#D97706" font-size="11" font-weight="bold">Player Intelligence</text>
  <text x="820" y="237" text-anchor="middle" fill="#6B7280" font-size="9">312 behavioral insights</text>
  <text x="820" y="250" text-anchor="middle" fill="#6B7280" font-size="9">for matching + hints</text>

  <!-- Dept 3: Evolution -->
  <rect x="860" y="200" width="180" height="55" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="950" y="220" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">Evolution &amp; QA</text>
  <text x="950" y="237" text-anchor="middle" fill="#6B7280" font-size="9">94 cross-type insights</text>
  <text x="950" y="250" text-anchor="middle" fill="#6B7280" font-size="9">for quality + evolution</text>

  <!-- Smart agent boxes -->
  <rect x="600" y="280" width="200" height="100" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="303" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Designer Agent</text>
  <text x="700" y="320" text-anchor="middle" fill="#059669" font-size="10">Knows from memory:</text>
  <text x="700" y="335" text-anchor="middle" fill="#6B7280" font-size="9">"Last 3 auth_bypass leaked via /debug"</text>
  <text x="700" y="350" text-anchor="middle" fill="#6B7280" font-size="9">"SQLite breaks UNION --- use PostgreSQL"</text>
  <text x="700" y="365" text-anchor="middle" fill="#059669" font-size="9">Avoids known failure modes</text>

  <rect x="840" y="280" width="200" height="100" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="303" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Exploit Agent</text>
  <text x="940" y="320" text-anchor="middle" fill="#059669" font-size="10">Knows from memory:</text>
  <text x="940" y="335" text-anchor="middle" fill="#6B7280" font-size="9">"CSP challenges need DOM vectors"</text>
  <text x="940" y="350" text-anchor="middle" fill="#6B7280" font-size="9">"Small-e RSA: try Wiener's first"</text>
  <text x="940" y="365" text-anchor="middle" fill="#059669" font-size="9">Skips failed strategies</text>

  <rect x="600" y="400" width="200" height="100" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="423" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Calibrator Agent</text>
  <text x="700" y="440" text-anchor="middle" fill="#059669" font-size="10">Knows from memory:</text>
  <text x="700" y="455" text-anchor="middle" fill="#6B7280" font-size="9">"RSA consistently calibrates 0.3 low"</text>
  <text x="700" y="470" text-anchor="middle" fill="#6B7280" font-size="9">"Heap pwn needs +0.5 difficulty boost"</text>
  <text x="700" y="485" text-anchor="middle" fill="#059669" font-size="9">Self-correcting over time</text>

  <rect x="840" y="400" width="200" height="100" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="423" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Evolution Worker</text>
  <text x="940" y="440" text-anchor="middle" fill="#059669" font-size="10">Knows from memory:</text>
  <text x="940" y="455" text-anchor="middle" fill="#6B7280" font-size="9">"web.py v12 fails: SQLite for UNION"</text>
  <text x="940" y="470" text-anchor="middle" fill="#6B7280" font-size="9">"Loop A mutations work best at +0.3"</text>
  <text x="940" y="485" text-anchor="middle" fill="#059669" font-size="9">Cross-loop intelligence</text>

  <!-- Bottom: Key insight -->
  <rect x="600" y="520" width="440" height="135" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="547" text-anchor="middle" fill="#059669" font-size="14" font-weight="bold">What Changes</text>

  <circle cx="625" cy="572" r="5" fill="#059669"/>
  <text x="640" y="577" fill="#374151" font-size="11">Designer avoids patterns that caused failures in past runs</text>

  <circle cx="625" cy="595" r="5" fill="#059669"/>
  <text x="640" y="600" fill="#374151" font-size="11">Exploit tries proven strategies first, skips known dead ends</text>

  <circle cx="625" cy="618" r="5" fill="#059669"/>
  <text x="640" y="623" fill="#374151" font-size="11">Calibrator self-corrects systematic bias per category</text>

  <circle cx="625" cy="641" r="5" fill="#059669"/>
  <text x="640" y="646" fill="#374151" font-size="11">Web challenge insights transfer automatically to API security</text>

  <!-- Bottom label -->
  <text x="550" y="688" text-anchor="middle" fill="#374151" font-size="12" font-style="italic">Level Up is the proof of concept AND the first customer for federation memory infrastructure</text>
</svg>