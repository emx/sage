<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE2E2"/>
      <stop offset="100%" style="stop-color:#FECACA"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D1FAE5"/>
      <stop offset="100%" style="stop-color:#A7F3D0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="650" rx="12" fill="#F0F6FF"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="60" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="30" width="1100" height="30" fill="url(#headerGrad)"/>
  <text x="550" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Figure 1: The Memory Gap --- Today vs. The Future</text>

  <!-- LEFT SIDE: TODAY -->
  <rect x="30" y="80" width="500" height="540" rx="12" fill="url(#redGrad)" stroke="#DC2626" stroke-width="2" opacity="0.5"/>
  <text x="280" y="110" text-anchor="middle" fill="#DC2626" font-size="20" font-weight="bold">TODAY: Amnesiac Agents</text>

  <!-- LLM Box -->
  <rect x="180" y="135" width="200" height="60" rx="10" fill="white" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="160" text-anchor="middle" fill="#1E3A5F" font-size="15" font-weight="bold">LLM (Brain)</text>
  <text x="280" y="178" text-anchor="middle" fill="#6B7280" font-size="11">GPT / Claude / Falcon</text>

  <!-- Arrow down -->
  <line x1="280" y1="195" x2="280" y2="225" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent A -->
  <rect x="70" y="230" width="130" height="80" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="135" y="258" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Agent A</text>
  <text x="135" y="278" text-anchor="middle" fill="#DC2626" font-size="11">No memory</text>
  <text x="135" y="293" text-anchor="middle" fill="#DC2626" font-size="11">Starts cold</text>

  <!-- Agent B -->
  <rect x="215" y="230" width="130" height="80" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="258" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Agent B</text>
  <text x="280" y="278" text-anchor="middle" fill="#DC2626" font-size="11">No memory</text>
  <text x="280" y="293" text-anchor="middle" fill="#DC2626" font-size="11">Starts cold</text>

  <!-- Agent C -->
  <rect x="360" y="230" width="130" height="80" rx="10" fill="white" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="425" y="258" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Agent C</text>
  <text x="425" y="278" text-anchor="middle" fill="#DC2626" font-size="11">No memory</text>
  <text x="425" y="293" text-anchor="middle" fill="#DC2626" font-size="11">Starts cold</text>

  <!-- X marks between agents -->
  <text x="177" y="275" text-anchor="middle" fill="#DC2626" font-size="24" font-weight="bold">X</text>
  <text x="347" y="275" text-anchor="middle" fill="#DC2626" font-size="24" font-weight="bold">X</text>

  <!-- Problems list -->
  <rect x="60" y="340" width="440" height="260" rx="10" fill="white" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="370" text-anchor="middle" fill="#DC2626" font-size="14" font-weight="bold">Consequences of Amnesia</text>

  <circle cx="90" cy="400" r="6" fill="#DC2626"/>
  <text x="105" y="405" fill="#374151" font-size="12">Same mistakes repeated across sessions</text>

  <circle cx="90" cy="430" r="6" fill="#DC2626"/>
  <text x="105" y="435" fill="#374151" font-size="12">Insights die when session ends</text>

  <circle cx="90" cy="460" r="6" fill="#DC2626"/>
  <text x="105" y="465" fill="#374151" font-size="12">No cross-agent learning or coordination</text>

  <circle cx="90" cy="490" r="6" fill="#DC2626"/>
  <text x="105" y="495" fill="#374151" font-size="12">New agents start completely cold</text>

  <circle cx="90" cy="520" r="6" fill="#DC2626"/>
  <text x="105" y="525" fill="#374151" font-size="12">Organization gets no smarter over time</text>

  <circle cx="90" cy="550" r="6" fill="#DC2626"/>
  <text x="105" y="555" fill="#374151" font-size="12">No audit trail of learned experience</text>

  <circle cx="90" cy="580" r="6" fill="#DC2626"/>
  <text x="105" y="585" fill="#374151" font-size="12">Can't verify what agents claim to know</text>

  <!-- RIGHT SIDE: FUTURE -->
  <rect x="570" y="80" width="500" height="540" rx="12" fill="url(#greenGrad)" stroke="#059669" stroke-width="2" opacity="0.5"/>
  <text x="820" y="110" text-anchor="middle" fill="#059669" font-size="20" font-weight="bold">FUTURE: Memory-Enabled Agents</text>

  <!-- LLM Box -->
  <rect x="720" y="135" width="200" height="60" rx="10" fill="white" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="160" text-anchor="middle" fill="#1E3A5F" font-size="15" font-weight="bold">LLM (Brain)</text>
  <text x="820" y="178" text-anchor="middle" fill="#6B7280" font-size="11">GPT / Claude / Falcon</text>

  <!-- Arrow down to memory layer -->
  <line x1="820" y1="195" x2="820" y2="225" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MEMORY LAYER - the key new addition -->
  <rect x="640" y="230" width="360" height="70" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="3" filter="url(#shadow)"/>
  <text x="820" y="257" text-anchor="middle" fill="#059669" font-size="16" font-weight="bold">SHARED MEMORY LAYER</text>
  <text x="820" y="278" text-anchor="middle" fill="#047857" font-size="12">Persistent | Shared | Verifiable | Immutable</text>

  <!-- Arrows down to agents -->
  <line x1="720" y1="300" x2="680" y2="340" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="820" y1="300" x2="820" y2="340" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="920" y1="300" x2="960" y2="340" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Agent A -->
  <rect x="610" y="345" width="130" height="80" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="373" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Agent A</text>
  <text x="675" y="393" text-anchor="middle" fill="#059669" font-size="11">Full context</text>
  <text x="675" y="408" text-anchor="middle" fill="#059669" font-size="11">Learns + shares</text>

  <!-- Agent B -->
  <rect x="755" y="345" width="130" height="80" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="373" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Agent B</text>
  <text x="820" y="393" text-anchor="middle" fill="#059669" font-size="11">Full context</text>
  <text x="820" y="408" text-anchor="middle" fill="#059669" font-size="11">Learns + shares</text>

  <!-- Agent C -->
  <rect x="900" y="345" width="130" height="80" rx="10" fill="white" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="965" y="373" text-anchor="middle" fill="#1E3A5F" font-size="13" font-weight="bold">Agent C</text>
  <text x="965" y="393" text-anchor="middle" fill="#059669" font-size="11">Full context</text>
  <text x="965" y="408" text-anchor="middle" fill="#059669" font-size="11">Learns + shares</text>

  <!-- Bidirectional arrows between agents via memory -->
  <path d="M 675 345 C 675 330 820 330 820 345" stroke="#059669" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 820 345 C 820 330 965 330 965 345" stroke="#059669" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Benefits list -->
  <rect x="600" y="455" width="440" height="145" rx="10" fill="white" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="480" text-anchor="middle" fill="#059669" font-size="14" font-weight="bold">What Changes</text>

  <circle cx="630" cy="505" r="6" fill="#059669"/>
  <text x="645" y="510" fill="#374151" font-size="12">Every agent learns from every other agent's experience</text>

  <circle cx="630" cy="530" r="6" fill="#059669"/>
  <text x="645" y="535" fill="#374151" font-size="12">New agents onboard in seconds with full institutional knowledge</text>

  <circle cx="630" cy="555" r="6" fill="#059669"/>
  <text x="645" y="560" fill="#374151" font-size="12">Organization gets smarter with every interaction</text>

  <circle cx="630" cy="580" r="6" fill="#059669"/>
  <text x="645" y="585" fill="#374151" font-size="12">Verifiable, tamper-proof memory with full provenance</text>

  <!-- Center arrow -->
  <text x="545" y="360" text-anchor="middle" fill="#2563EB" font-size="36" font-weight="bold">&gt;</text>
</svg>