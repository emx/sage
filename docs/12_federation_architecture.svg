<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 830" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891B2"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="830" rx="12" fill="#F0F6FF"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="60" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="30" width="1100" height="30" fill="url(#headerGrad)"/>
  <text x="550" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Figure 2: Federation Architecture --- Blockchain-Synchronized Agent Memory</text>

  <!-- BLOCKCHAIN LAYER -->
  <rect x="50" y="85" width="1000" height="120" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="550" y="115" text-anchor="middle" fill="#5B21B6" font-size="18" font-weight="bold">FEDERATION BLOCKCHAIN</text>
  <text x="550" y="138" text-anchor="middle" fill="#6D28D9" font-size="12">Canonical Institutional Memory --- Immutable, Consensus-Validated, Syncable</text>

  <!-- Chain blocks -->
  <rect x="80" y="155" width="85" height="35" rx="6" fill="#7C3AED" opacity="0.8"/>
  <text x="122" y="177" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Block 4205</text>
  <rect x="175" y="155" width="85" height="35" rx="6" fill="#7C3AED" opacity="0.85"/>
  <text x="217" y="177" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Block 4206</text>
  <rect x="270" y="155" width="85" height="35" rx="6" fill="#7C3AED" opacity="0.9"/>
  <text x="312" y="177" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Block 4207</text>
  <rect x="365" y="155" width="85" height="35" rx="6" fill="#7C3AED" opacity="0.95"/>
  <text x="407" y="177" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Block 4208</text>
  <!-- Chain links -->
  <line x1="165" y1="172" x2="175" y2="172" stroke="#7C3AED" stroke-width="2"/>
  <line x1="260" y1="172" x2="270" y2="172" stroke="#7C3AED" stroke-width="2"/>
  <line x1="355" y1="172" x2="365" y2="172" stroke="#7C3AED" stroke-width="2"/>
  <line x1="450" y1="172" x2="460" y2="172" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Memory count -->
  <rect x="700" y="152" width="320" height="40" rx="8" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="860" y="170" text-anchor="middle" fill="#5B21B6" font-size="11">Goals | Principles | 23,891 Validated Memories | Provenance</text>
  <text x="860" y="184" text-anchor="middle" fill="#7C3AED" font-size="10">Every memory: who learned it, when, in what context, confidence score</text>

  <!-- SYNC ARROWS from blockchain down -->
  <line x1="200" y1="205" x2="200" y2="270" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <line x1="550" y1="205" x2="550" y2="270" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <line x1="900" y1="205" x2="900" y2="270" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <text x="200" y="245" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="bold">SYNC</text>
  <text x="550" y="245" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="bold">SYNC</text>
  <text x="900" y="245" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="bold">SYNC</text>

  <!-- DEPARTMENT 1: Security -->
  <rect x="50" y="275" width="300" height="140" rx="12" fill="#ECFEFF" stroke="#0891B2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="275" width="300" height="35" rx="12" fill="#0891B2"/>
  <rect x="50" y="295" width="300" height="15" fill="#0891B2"/>
  <text x="200" y="297" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DEPT: Challenge Generation</text>

  <!-- Dept lead -->
  <rect x="130" y="320" width="140" height="40" rx="8" fill="white" stroke="#0891B2" stroke-width="2"/>
  <text x="200" y="345" text-anchor="middle" fill="#0891B2" font-size="12" font-weight="bold">Dept Lead Agent</text>
  <text x="200" y="375" text-anchor="middle" fill="#0891B2" font-size="10">Distills 847 relevant memories</text>
  <text x="200" y="390" text-anchor="middle" fill="#0891B2" font-size="10">for challenge generation context</text>

  <!-- DEPARTMENT 2: Intelligence -->
  <rect x="400" y="275" width="300" height="140" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
  <rect x="400" y="275" width="300" height="35" rx="12" fill="#D97706"/>
  <rect x="400" y="295" width="300" height="15" fill="#D97706"/>
  <text x="550" y="297" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DEPT: Player Intelligence</text>

  <!-- Dept lead -->
  <rect x="480" y="320" width="140" height="40" rx="8" fill="white" stroke="#D97706" stroke-width="2"/>
  <text x="550" y="345" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold">Dept Lead Agent</text>
  <text x="550" y="375" text-anchor="middle" fill="#D97706" font-size="10">Distills 312 relevant memories</text>
  <text x="550" y="390" text-anchor="middle" fill="#D97706" font-size="10">for player analysis context</text>

  <!-- DEPARTMENT 3: Evolution -->
  <rect x="750" y="275" width="300" height="140" rx="12" fill="#D1FAE5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="750" y="275" width="300" height="35" rx="12" fill="#059669"/>
  <rect x="750" y="295" width="300" height="15" fill="#059669"/>
  <text x="900" y="297" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DEPT: Evolution &amp; QA</text>

  <!-- Dept lead -->
  <rect x="830" y="320" width="140" height="40" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
  <text x="900" y="345" text-anchor="middle" fill="#059669" font-size="12" font-weight="bold">Dept Lead Agent</text>
  <text x="900" y="375" text-anchor="middle" fill="#059669" font-size="10">Distills 94 cross-type insights</text>
  <text x="900" y="390" text-anchor="middle" fill="#059669" font-size="10">for evolution + quality control</text>

  <!-- DISTILLATION ARROWS -->
  <text x="200" y="425" text-anchor="middle" fill="#0891B2" font-size="10" font-weight="bold">DISTILL</text>
  <text x="550" y="425" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold">DISTILL</text>
  <text x="900" y="425" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">DISTILL</text>

  <line x1="130" y1="415" x2="100" y2="455" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="200" y1="415" x2="200" y2="455" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="270" y1="415" x2="300" y2="455" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <line x1="480" y1="415" x2="450" y2="455" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="550" y1="415" x2="550" y2="455" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="620" y1="415" x2="650" y2="455" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <line x1="830" y1="415" x2="800" y2="455" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="900" y1="415" x2="900" y2="455" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="970" y1="415" x2="1000" y2="455" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- SUB-AGENTS ROW 1 -->
  <rect x="60" y="460" width="100" height="50" rx="8" fill="white" stroke="#0891B2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="482" text-anchor="middle" fill="#0891B2" font-size="10" font-weight="bold">Designer</text>
  <text x="110" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Web/Crypto/Pwn</text>

  <rect x="170" y="460" width="100" height="50" rx="8" fill="white" stroke="#0891B2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="482" text-anchor="middle" fill="#0891B2" font-size="10" font-weight="bold">Validator</text>
  <text x="220" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Build + Test</text>

  <rect x="280" y="460" width="100" height="50" rx="8" fill="white" stroke="#0891B2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="482" text-anchor="middle" fill="#0891B2" font-size="10" font-weight="bold">Exploit</text>
  <text x="330" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Auto-Solve</text>

  <rect x="410" y="460" width="100" height="50" rx="8" fill="white" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="482" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold">Behavioral</text>
  <text x="460" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Telemetry</text>

  <rect x="520" y="460" width="100" height="50" rx="8" fill="white" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="482" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold">Hint</text>
  <text x="570" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Skill-Aware</text>

  <rect x="630" y="460" width="100" height="50" rx="8" fill="white" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="482" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold">Matching</text>
  <text x="680" y="498" text-anchor="middle" fill="#6B7280" font-size="9">ELO + Skill Vec</text>

  <rect x="760" y="460" width="100" height="50" rx="8" fill="white" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="810" y="482" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">Evolution</text>
  <text x="810" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Loops A-D</text>

  <rect x="870" y="460" width="100" height="50" rx="8" fill="white" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="920" y="482" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">Calibrator</text>
  <text x="920" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Difficulty</text>

  <rect x="980" y="460" width="70" height="50" rx="8" fill="white" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1015" y="482" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">QA</text>
  <text x="1015" y="498" text-anchor="middle" fill="#6B7280" font-size="9">Scoring</text>

  <!-- CONTRIBUTE BACK arrows -->
  <text x="550" y="545" text-anchor="middle" fill="#7C3AED" font-size="12" font-weight="bold">New Learnings Proposed Back to Chain (Validated by Consensus)</text>

  <!-- Upward arrows from agents -->
  <path d="M 110 460 L 110 440 Q 110 435 115 435 L 540 435 Q 545 435 545 430" stroke="#7C3AED" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <path d="M 330 460 L 330 440 Q 330 435 335 435 L 545 435" stroke="#7C3AED" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <path d="M 920 460 L 920 440 Q 920 435 915 435 L 555 435" stroke="#7C3AED" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <!-- ONBOARDING FLOW at bottom -->
  <rect x="50" y="570" width="1000" height="240" rx="12" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="600" text-anchor="middle" fill="#1E3A5F" font-size="16" font-weight="bold">Agent Onboarding: How a New Agent Joins the Federation</text>

  <!-- Step 1 -->
  <rect x="80" y="620" width="160" height="65" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="100" cy="640" r="12" fill="#7C3AED"/>
  <text x="100" y="645" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
  <text x="165" y="640" text-anchor="middle" fill="#5B21B6" font-size="11" font-weight="bold">SYNC</text>
  <text x="160" y="658" text-anchor="middle" fill="#6B7280" font-size="10">Download chain</text>
  <text x="160" y="672" text-anchor="middle" fill="#6B7280" font-size="10">23,891 memories</text>

  <line x1="240" y1="652" x2="275" y2="652" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="280" y="620" width="160" height="65" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="300" cy="640" r="12" fill="#0891B2"/>
  <text x="300" y="645" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
  <text x="365" y="640" text-anchor="middle" fill="#0891B2" font-size="11" font-weight="bold">SPECIALIZE</text>
  <text x="360" y="658" text-anchor="middle" fill="#6B7280" font-size="10">Dept lead distills</text>
  <text x="360" y="672" text-anchor="middle" fill="#6B7280" font-size="10">127 role-specific</text>

  <line x1="440" y1="652" x2="475" y2="652" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="480" y="620" width="160" height="65" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="500" cy="640" r="12" fill="#059669"/>
  <text x="500" y="645" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
  <text x="565" y="640" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">OPERATE</text>
  <text x="560" y="658" text-anchor="middle" fill="#6B7280" font-size="10">Run tasks with</text>
  <text x="560" y="672" text-anchor="middle" fill="#6B7280" font-size="10">full context</text>

  <line x1="640" y1="652" x2="675" y2="652" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="680" y="620" width="160" height="65" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="700" cy="640" r="12" fill="#D97706"/>
  <text x="700" y="645" text-anchor="middle" fill="white" font-size="12" font-weight="bold">4</text>
  <text x="765" y="640" text-anchor="middle" fill="#D97706" font-size="11" font-weight="bold">CONTRIBUTE</text>
  <text x="760" y="658" text-anchor="middle" fill="#6B7280" font-size="10">Propose new</text>
  <text x="760" y="672" text-anchor="middle" fill="#6B7280" font-size="10">memories to chain</text>

  <line x1="840" y1="652" x2="875" y2="652" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="880" y="620" width="145" height="65" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="900" cy="640" r="12" fill="#7C3AED"/>
  <text x="900" y="645" text-anchor="middle" fill="white" font-size="12" font-weight="bold">5</text>
  <text x="955" y="640" text-anchor="middle" fill="#5B21B6" font-size="11" font-weight="bold">PROPAGATE</text>
  <text x="952" y="658" text-anchor="middle" fill="#6B7280" font-size="10">Validated memories</text>
  <text x="952" y="672" text-anchor="middle" fill="#6B7280" font-size="10">sync to all agents</text>

  <!-- Timeline -->
  <text x="160" y="710" text-anchor="middle" fill="#9CA3AF" font-size="10">t = 0s</text>
  <text x="360" y="710" text-anchor="middle" fill="#9CA3AF" font-size="10">t = 2s</text>
  <text x="560" y="710" text-anchor="middle" fill="#9CA3AF" font-size="10">t = 4s</text>
  <text x="760" y="710" text-anchor="middle" fill="#9CA3AF" font-size="10">ongoing</text>
  <text x="952" y="710" text-anchor="middle" fill="#9CA3AF" font-size="10">continuous</text>

  <!-- Bottom label -->
  <text x="550" y="745" text-anchor="middle" fill="#374151" font-size="12" font-style="italic">A new agent goes from zero to fully operational with institutional knowledge in under 5 seconds</text>

  <!-- Properties labels (centered) -->
  <rect x="210" y="760" width="120" height="24" rx="12" fill="#7C3AED" opacity="0.15"/>
  <text x="270" y="776" text-anchor="middle" fill="#5B21B6" font-size="10" font-weight="bold">Immutable</text>
  <rect x="350" y="760" width="120" height="24" rx="12" fill="#7C3AED" opacity="0.15"/>
  <text x="410" y="776" text-anchor="middle" fill="#5B21B6" font-size="10" font-weight="bold">Consensus</text>
  <rect x="490" y="760" width="120" height="24" rx="12" fill="#7C3AED" opacity="0.15"/>
  <text x="550" y="776" text-anchor="middle" fill="#5B21B6" font-size="10" font-weight="bold">Provenance</text>
  <rect x="630" y="760" width="120" height="24" rx="12" fill="#7C3AED" opacity="0.15"/>
  <text x="690" y="776" text-anchor="middle" fill="#5B21B6" font-size="10" font-weight="bold">Hierarchical</text>
  <rect x="770" y="760" width="120" height="24" rx="12" fill="#7C3AED" opacity="0.15"/>
  <text x="830" y="776" text-anchor="middle" fill="#5B21B6" font-size="10" font-weight="bold">Persistent</text>
</svg>