<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" rx="12" fill="#F0F6FF"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="60" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="30" width="1100" height="30" fill="url(#headerGrad)"/>
  <text x="550" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Figure 3: Memory Architecture --- Hybrid Representation &amp; Data Flow</text>

  <!-- MEMORY UNIT (large center box) -->
  <rect x="50" y="80" width="480" height="360" rx="14" fill="white" stroke="#7C3AED" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="50" y="80" width="480" height="40" rx="14" fill="#7C3AED"/>
  <rect x="50" y="105" width="480" height="15" fill="#7C3AED"/>
  <text x="290" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">MEMORY UNIT (Hybrid Representation)</text>

  <!-- Semantic Layer -->
  <rect x="75" y="135" width="430" height="70" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="95" y="155" fill="#5B21B6" font-size="12" font-weight="bold">Semantic Layer (Natural Language)</text>
  <text x="95" y="175" fill="#374151" font-size="11" font-style="italic">"Flask apps require explicit flag file isolation or the</text>
  <text x="95" y="192" fill="#374151" font-size="11" font-style="italic">flag leaks through source inspection"</text>

  <!-- Knowledge Graph Layer -->
  <rect x="75" y="215" width="430" height="65" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="95" y="235" fill="#0891B2" font-size="12" font-weight="bold">Structured Layer (Knowledge Graph)</text>
  <!-- Graph nodes -->
  <rect x="95" y="248" width="100" height="22" rx="11" fill="#0891B2" opacity="0.2"/>
  <text x="145" y="263" text-anchor="middle" fill="#0891B2" font-size="9">flask_challenge</text>
  <line x1="195" y1="259" x2="245" y2="259" stroke="#0891B2" stroke-width="1.5"/>
  <text x="220" y="253" text-anchor="middle" fill="#0891B2" font-size="8">requires</text>
  <rect x="245" y="248" width="100" height="22" rx="11" fill="#0891B2" opacity="0.2"/>
  <text x="295" y="263" text-anchor="middle" fill="#0891B2" font-size="9">flag_isolation</text>
  <line x1="345" y1="259" x2="395" y2="259" stroke="#0891B2" stroke-width="1.5"/>
  <text x="370" y="253" text-anchor="middle" fill="#0891B2" font-size="8">prevents</text>
  <rect x="395" y="248" width="90" height="22" rx="11" fill="#0891B2" opacity="0.2"/>
  <text x="440" y="263" text-anchor="middle" fill="#0891B2" font-size="9">source_leak</text>

  <!-- Vector Layer -->
  <rect x="75" y="290" width="430" height="50" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="95" y="310" fill="#D97706" font-size="12" font-weight="bold">Vector Layer (Embedding for Similarity Search)</text>
  <text x="95" y="328" fill="#92400E" font-size="11" font-family="'Courier New', monospace">[0.23, -0.87, 0.41, 0.15, -0.33, 0.72, ...]</text>

  <!-- Metadata -->
  <rect x="75" y="350" width="430" height="80" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="95" y="370" fill="#374151" font-size="12" font-weight="bold">Metadata (Provenance + Context)</text>
  <text x="95" y="390" fill="#6B7280" font-size="10" font-family="'Courier New', monospace">agent: "designer-7"  context: "web.auth_bypass"</text>
  <text x="95" y="406" fill="#6B7280" font-size="10" font-family="'Courier New', monospace">confidence: 0.92    corroborations: 14</text>
  <text x="95" y="422" fill="#6B7280" font-size="10" font-family="'Courier New', monospace">block: 4207        observed: 2026-02-20T03:14:00Z</text>

  <!-- RIGHT SIDE: Memory Lifecycle -->
  <rect x="570" y="80" width="500" height="360" rx="14" fill="white" stroke="#2563EB" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="570" y="80" width="500" height="40" rx="14" fill="#2563EB"/>
  <rect x="570" y="105" width="500" height="15" fill="#2563EB"/>
  <text x="820" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Memory Lifecycle</text>

  <!-- Step 1: Experience -->
  <rect x="595" y="132" width="220" height="38" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="615" cy="151" r="10" fill="#DC2626"/>
  <text x="615" y="155" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
  <text x="715" y="148" text-anchor="middle" fill="#991B1B" font-size="11" font-weight="bold">EXPERIENCE</text>
  <text x="715" y="162" text-anchor="middle" fill="#6B7280" font-size="9">Agent encounters novel outcome</text>

  <line x1="815" y1="151" x2="840" y2="151" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Encode -->
  <rect x="845" y="132" width="200" height="38" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="865" cy="151" r="10" fill="#D97706"/>
  <text x="865" y="155" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
  <text x="950" y="148" text-anchor="middle" fill="#92400E" font-size="11" font-weight="bold">ENCODE</text>
  <text x="950" y="162" text-anchor="middle" fill="#6B7280" font-size="9">Structure as memory unit</text>

  <line x1="945" y1="170" x2="945" y2="195" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Propose -->
  <rect x="845" y="200" width="200" height="38" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="865" cy="219" r="10" fill="#7C3AED"/>
  <text x="865" y="223" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
  <text x="950" y="216" text-anchor="middle" fill="#5B21B6" font-size="11" font-weight="bold">PROPOSE</text>
  <text x="950" y="230" text-anchor="middle" fill="#6B7280" font-size="9">Submit to chain as pending tx</text>

  <line x1="845" y1="219" x2="820" y2="219" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Validate -->
  <rect x="595" y="200" width="220" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="615" cy="219" r="10" fill="#2563EB"/>
  <text x="615" y="223" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4</text>
  <text x="715" y="216" text-anchor="middle" fill="#1E40AF" font-size="11" font-weight="bold">VALIDATE (PoE Consensus)</text>
  <text x="715" y="232" text-anchor="middle" fill="#6B7280" font-size="9">Consistent? Agent credible?</text>
  <text x="715" y="245" text-anchor="middle" fill="#6B7280" font-size="9">Corroborated by others?</text>

  <line x1="705" y1="255" x2="705" y2="280" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Commit -->
  <rect x="595" y="285" width="220" height="38" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="615" cy="304" r="10" fill="#059669"/>
  <text x="615" y="308" text-anchor="middle" fill="white" font-size="10" font-weight="bold">5</text>
  <text x="715" y="301" text-anchor="middle" fill="#065F46" font-size="11" font-weight="bold">COMMIT</text>
  <text x="715" y="315" text-anchor="middle" fill="#6B7280" font-size="9">Added to blockchain permanently</text>

  <line x1="815" y1="304" x2="840" y2="304" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Propagate -->
  <rect x="845" y="285" width="200" height="38" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="865" cy="304" r="10" fill="#0891B2"/>
  <text x="865" y="308" text-anchor="middle" fill="white" font-size="10" font-weight="bold">6</text>
  <text x="950" y="301" text-anchor="middle" fill="#0891B2" font-size="11" font-weight="bold">PROPAGATE</text>
  <text x="950" y="315" text-anchor="middle" fill="#6B7280" font-size="9">Sync to relevant agents</text>

  <line x1="945" y1="323" x2="945" y2="348" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7: Apply -->
  <rect x="845" y="353" width="200" height="38" rx="8" fill="#F3E8FF" stroke="#9333EA" stroke-width="1.5"/>
  <circle cx="865" cy="372" r="10" fill="#9333EA"/>
  <text x="865" y="376" text-anchor="middle" fill="white" font-size="10" font-weight="bold">7</text>
  <text x="950" y="369" text-anchor="middle" fill="#9333EA" font-size="11" font-weight="bold">APPLY</text>
  <text x="950" y="383" text-anchor="middle" fill="#6B7280" font-size="9">Informs future reasoning</text>

  <!-- PoE CONSENSUS SECTION -->
  <rect x="50" y="470" width="1000" height="260" rx="14" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="470" width="1000" height="40" rx="14" fill="#1E3A5F"/>
  <rect x="50" y="495" width="1000" height="15" fill="#1E3A5F"/>
  <text x="550" y="497" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Proof of Experience (PoE) --- Consensus Mechanism</text>

  <text x="550" y="535" text-anchor="middle" fill="#374151" font-size="12">Unlike PoW (energy) or PoS (capital), PoE weights validation by demonstrated experience and track record</text>

  <!-- 4 PoE pillars -->
  <rect x="80" y="555" width="220" height="95" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="190" y="580" text-anchor="middle" fill="#5B21B6" font-size="13" font-weight="bold">Track Record</text>
  <text x="190" y="600" text-anchor="middle" fill="#6B7280" font-size="10">Agents with more validated</text>
  <text x="190" y="615" text-anchor="middle" fill="#6B7280" font-size="10">memories have higher</text>
  <text x="190" y="630" text-anchor="middle" fill="#6B7280" font-size="10">credibility in consensus</text>

  <rect x="320" y="555" width="220" height="95" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="430" y="580" text-anchor="middle" fill="#0891B2" font-size="13" font-weight="bold">Corroboration</text>
  <text x="430" y="600" text-anchor="middle" fill="#6B7280" font-size="10">Memories independently</text>
  <text x="430" y="615" text-anchor="middle" fill="#6B7280" font-size="10">observed by multiple agents</text>
  <text x="430" y="630" text-anchor="middle" fill="#6B7280" font-size="10">are weighted higher</text>

  <rect x="560" y="555" width="220" height="95" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="670" y="580" text-anchor="middle" fill="#92400E" font-size="13" font-weight="bold">Context Relevance</text>
  <text x="670" y="600" text-anchor="middle" fill="#6B7280" font-size="10">Domain-experienced</text>
  <text x="670" y="615" text-anchor="middle" fill="#6B7280" font-size="10">validators have stronger</text>
  <text x="670" y="630" text-anchor="middle" fill="#6B7280" font-size="10">votes in their domain</text>

  <rect x="800" y="555" width="220" height="95" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="910" y="580" text-anchor="middle" fill="#065F46" font-size="13" font-weight="bold">Decay &amp; Revision</text>
  <text x="910" y="600" text-anchor="middle" fill="#6B7280" font-size="10">Memories can be superseded</text>
  <text x="910" y="615" text-anchor="middle" fill="#6B7280" font-size="10">(not deleted) when new</text>
  <text x="910" y="630" text-anchor="middle" fill="#6B7280" font-size="10">evidence contradicts</text>

  <!-- Bottom note -->
  <text x="550" y="710" text-anchor="middle" fill="#374151" font-size="11" font-style="italic">Each memory unit is optimized for three access patterns: natural language reasoning, graph traversal, and similarity search</text>
</svg>